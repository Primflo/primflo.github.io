<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Admin</title>
    <style>
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .page-title span {
            color: #b74b4b;
        }
        .typing-subtitle {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            min-width: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .typing-subtitle .prefix {
            color: white;
        }
        .typing-subtitle .name {
            color: #b74b4b;
            font-weight: bold;
            position: relative;
            display: inline-block;
            min-width: 120px;
            text-align: left;
        }
        .typing-subtitle .name::after {
            content: "|";
            position: absolute;
            right: -8px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .running-cat {
            display: none !important;
        }
        .admin-container {
            text-align: center;
        }
        @media (max-width: 768px) {
            .typing-subtitle { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" class="active">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none; font-size: 30px; cursor: pointer;">☰</div>
    </header>

    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content admin-container">
            <h1 class="page-title">Admin <span>Panel</span></h1>
            
            <div class="typing-subtitle">
                <span class="prefix">I am</span>
                <span class="name" id="typedName"></span>
            </div>
            
            <div class="social-icons">
                <a href="https://linkedin.com/in/prim" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/prim" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://twitter.com/prim" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://instagram.com/prim" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
            
            <button class="btn" onclick="location.href='contact.html'">HUG ME</button>
        </div>
    </section>

    <script>
        // ========== LOGIN CHECK ==========
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'whale/';
        }
        
        // ========== TYPING ANIMATION ==========
        const name = "Pritam";
        const nameElement = document.getElementById('typedName');
        let index = 0;
        
        function typeName() {
            if (index < name.length) {
                nameElement.textContent += name.charAt(index);
                index++;
                setTimeout(typeName, 150);
            }
        }
        
        typeName();
        
        // ========== LOGOUT ==========
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'whale/';
        });
        
        // ========== MOBILE MENU ==========
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        
        if (window.innerWidth <= 995 && hamburger) {
            hamburger.style.display = 'block';
        }
        
        if (hamburger) {
            hamburger.addEventListener('click', function() {
                nav.classList.toggle('active');
            });
        }
        
        window.addEventListener('resize', function() {
            if (window.innerWidth > 995) {
                if (hamburger) hamburger.style.display = 'none';
                if (nav) nav.classList.remove('active');
            } else {
                if (hamburger) hamburger.style.display = 'block';
            }
        });
        
        document.querySelectorAll('nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                if (nav) nav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
