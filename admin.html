<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Admin</title>
    <style>
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .page-title span {
            color: #b74b4b;
        }
        .typing-subtitle {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            min-width: 280px;
        }
        .typing-subtitle span {
            color: #b74b4b;
            position: relative;
        }
        .typing-subtitle span::before {
            content: "Pritam";
            color: #b74b4b;
            animation: adminWords 4s infinite;
        }
        .typing-subtitle span::after {
            content: "";
            background-color: black;
            position: absolute;
            width: calc(100% + 8px);
            height: 100%;
            border-left: 3px solid black;
            right: -8px;
            animation: cursor 0.6s infinite;
        }
        @keyframes cursor {
            to { border-left: 3px solid #b74b4b; }
        }
        @keyframes adminWords {
            0%, 100% { content: "Pritam"; }
        }
        .running-cat {
            display: none !important;
        }
        .admin-container {
            text-align: center;
        }
        .admin-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            border: 3px solid #b74b4b;
            transition: all 0.3s ease;
        }
        .admin-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(183, 75, 75, 0.6);
        }
        @media (max-width: 768px) {
            .typing-subtitle { font-size: 1.8rem; }
            .admin-img { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" class="active">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none; font-size: 30px; cursor: pointer;">☰</div>
    </header>

    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content admin-container">
            <h1 class="page-title">Admin <span>Panel</span></h1>
            
            <div class="typing-subtitle">
                I am <span></span>
            </div>
            
            <div class="social-icons">
                <a href="https://linkedin.com/in/prim" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/prim" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://twitter.com/prim" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://instagram.com/prim" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
            
            <button class="btn" onclick="location.href='contact.html'">HUG ME</button>
        </div>
    </section>

    <script>
        // ========== LOGIN CHECK ==========
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'whale/';
        }
        
        // ========== LOGOUT ==========
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'whale/';
        });
        
        // ========== MOBILE MENU ==========
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        
        if (window.innerWidth <= 995 && hamburger) {
            hamburger.style.display = 'block';
        }
        
        if (hamburger) {
            hamburger.addEventListener('click', function() {
                nav.classList.toggle('active');
            });
        }
        
        window.addEventListener('resize', function() {
            if (window.innerWidth > 995) {
                if (hamburger) hamburger.style.display = 'none';
                if (nav) nav.classList.remove('active');
            } else {
                if (hamburger) hamburger.style.display = 'block';
            }
        });
        
        document.querySelectorAll('nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                if (nav) nav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
