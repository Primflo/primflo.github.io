<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Prim - Login</title>
    <style>
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            background: transparent;
            border: 2px solid rgba(183, 75, 75, 0.3);
            backdrop-filter: blur(9px);
            color: #fff;
            border-radius: 12px;
            padding: 30px 40px;
            transition: 0.3s ease;
        }
        
        .login-wrapper:hover {
            border-color: #b74b4b;
            box-shadow: 0 0 20px rgba(183, 75, 75, 0.2);
        }
        
        .login-wrapper h1 {
            font-size: 36px;
            text-align: center;
            color: #b74b4b;
            margin-bottom: 20px;
        }
        
        .login-wrapper .input-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }
        
        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border: 2px solid rgba(183, 75, 75, 0.3);
            border-radius: 40px;
            font-size: 16px;
            color: #fff;
            padding: 20px 45px 20px 20px;
            transition: 0.3s ease;
        }
        
        .input-box input:focus {
            border-color: #b74b4b;
            box-shadow: 0 0 10px rgba(183, 75, 75, 0.3);
        }
        
        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #b74b4b;
        }
        
        .login-wrapper .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }
        
        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .remember-forgot label input {
            accent-color: #b74b4b;
            margin-right: 3px;
            cursor: pointer;
        }
        
        .remember-forgot a {
            color: #b74b4b;
            text-decoration: none;
            transition: 0.3s ease;
        }
        
        .remember-forgot a:hover {
            text-decoration: underline;
            color: #d46969;
        }
        
        .login-wrapper .btn {
            width: 100%;
            height: 45px;
            background: #b74b4b;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(183, 75, 75, 0.3);
            cursor: pointer;
            font-size: 16px;
            color: white;
            font-weight: 600;
            transition: 0.3s ease;
        }
        
        .login-wrapper .btn:hover {
            background: #d46969;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(183, 75, 75, 0.5);
        }
        
        .login-wrapper .register-link {
            font-size: 14.5px;
            text-align: center;
            margin: 20px 0 15px;
        }
        
        .register-link p a {
            color: #b74b4b;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }
        
        .register-link p a:hover {
            text-decoration: underline;
            color: #d46969;
        }
        
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .page-title span {
            color: #b74b4b;
        }
        
        @media (max-width: 768px) {
            .login-wrapper {
                padding: 20px 25px;
            }
            
            .login-wrapper h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="login.html" class="active">Login</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1 class="page-title">Welcome <span>Back</span></h1>
            
            <div class="login-wrapper">
                <form action="">
                    <h1>Login</h1>
                    <div class="input-box">
                        <input type="text" placeholder="Username" required>
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Password" required>
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    <div class="remember-forgot">
                        <label><input type="checkbox">Remember Me</label>
                        <a href="#">Forgot Password</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <div class="register-link">
                        <p>Don't have an account? <a href="#">Register</a></p>
                    </div>
                </form>
            </div>
            
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>
</body>
</html>
