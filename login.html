<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prim Portfolio</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: black;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('main.jpg') no-repeat center center/cover;
            opacity: 0.25;
            z-index: 0;
            animation: slowZoom 20s ease infinite;
        }
        
        @keyframes slowZoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Running Cat */
        .running-cat {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(183, 75, 75, 0.3);
            cursor: pointer;
        }
        
        .cat-run {
            font-size: 2rem;
            animation: runCycle 0.5s infinite;
        }
        
        @keyframes runCycle {
            0%, 100% { transform: translateX(0px); }
            25% { transform: translateX(3px); }
            75% { transform: translateX(-3px); }
        }
        
        /* Login Wrapper */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(183, 75, 75, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(183, 75, 75, 0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .wrapper:hover {
            border-color: #b74b4b;
            box-shadow: 0 0 60px rgba(183, 75, 75, 0.4);
        }
        
        .wrapper h1 {
            font-size: 3.6rem;
            text-align: center;
            color: #b74b4b;
            margin-bottom: 30px;
        }
        
        .input-box {
            position: relative;
            width: 100%;
            height: 55px;
            margin: 30px 0;
        }
        
        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(183, 75, 75, 0.3);
            border-radius: 50px;
            font-size: 1.6rem;
            color: #fff;
            padding: 20px 45px 20px 20px;
            transition: all 0.3s ease;
        }
        
        .input-box input:focus {
            border-color: #b74b4b;
            box-shadow: 0 0 15px rgba(183, 75, 75, 0.3);
        }
        
        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: #b74b4b;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            margin: -15px 0 20px;
        }
        
        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .remember-forgot label input {
            accent-color: #b74b4b;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .remember-forgot a {
            color: #b74b4b;
            transition: 0.3s;
        }
        
        .remember-forgot a:hover {
            text-decoration: underline;
        }
        
        .btn {
            width: 100%;
            height: 50px;
            background: #b74b4b;
            border: none;
            border-radius: 50px;
            font-size: 1.6rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #d46969;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(183, 75, 75, 0.5);
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 1.4rem;
        }
        
        .register-link a {
            color: #b74b4b;
            font-weight: 600;
        }
        
        .error-message {
            color: #ff4757;
            text-align: center;
            margin-top: 15px;
            font-size: 1.3rem;
            display: none;
        }
        
        @media (max-width: 480px) {
            .wrapper {
                margin: 20px;
                padding: 30px 25px;
            }
            
            .wrapper h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Running Cat -->
    <div class="running-cat">
        <div class="cat-run">🐱</div>
        <div style="font-size: 1.2rem;">CPU: <span id="cpuLoad">0</span>%</div>
    </div>
    
    <div class="wrapper">
        <form id="loginForm">
            <h1>Welcome Back</h1>
            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="register-link">
                <p>Don't have an account? <a href="#">Contact Admin</a></p>
            </div>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>
    
    <script>
        // Credentials
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "admin123";
        
        // Simulate CPU for cat
        let cpu = 0;
        let cpuDirection = 1;
        
        function updateCPU() {
            cpu += cpuDirection * (Math.random() * 15);
            if (cpu >= 100) {
                cpu = 100;
                cpuDirection = -1;
            } else if (cpu <= 0) {
                cpu = 0;
                cpuDirection = 1;
            }
            document.getElementById('cpuLoad').textContent = Math.floor(cpu);
            setTimeout(updateCPU, 800);
        }
        updateCPU();
        
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMessage');
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('isAdmin', 'true');
                
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('rememberMe');
                    localStorage.removeItem('savedUsername');
                }
                
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = 'Invalid username or password!';
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });
        
        // Load saved username
        if (localStorage.getItem('rememberMe') === 'true') {
            document.getElementById('username').value = localStorage.getItem('savedUsername') || '';
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
