<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smooth Whale</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628, #0d1f3c, #0a1628);
            position: relative;
            overflow: hidden;
        }
        
        /* Ocean background overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('main.jpg') no-repeat center center/cover;
            opacity: 0.12;
            z-index: 0;
        }
        
        /* ============================================
           WHALE CONTAINER - SMOOTH SWIMMING
           ============================================ */
        
        .whale-container {
            position: fixed;
            bottom: 15%;
            left: -400px;
            z-index: 100;
            filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.3));
            animation: smoothSwim 24s cubic-bezier(0.45, 0.05, 0.2, 0.95) infinite;
        }
        
        /* Ultra-smooth swimming path */
        @keyframes smoothSwim {
            0% {
                left: -400px;
                bottom: 15%;
                transform: rotate(0deg) scale(1);
                filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.3));
            }
            15% {
                left: 5%;
                bottom: 17%;
                transform: rotate(-1deg) scale(1.01);
                filter: drop-shadow(0 0 25px rgba(0, 150, 255, 0.35));
            }
            30% {
                left: 25%;
                bottom: 13%;
                transform: rotate(1deg) scale(0.99);
                filter: drop-shadow(0 0 22px rgba(0, 150, 255, 0.32));
            }
            /* JUMP! */
            45% {
                left: 45%;
                bottom: 55%;
                transform: rotate(-12deg) scale(1.08);
                filter: drop-shadow(0 0 45px rgba(0, 200, 255, 0.7));
            }
            50% {
                left: 48%;
                bottom: 60%;
                transform: rotate(-18deg) scale(1.12);
                filter: drop-shadow(0 0 55px rgba(0, 200, 255, 0.9));
            }
            55% {
                left: 51%;
                bottom: 48%;
                transform: rotate(-5deg) scale(1.05);
                filter: drop-shadow(0 0 40px rgba(0, 200, 255, 0.6));
            }
            70% {
                left: 70%;
                bottom: 14%;
                transform: rotate(0.5deg) scale(1);
                filter: drop-shadow(0 0 25px rgba(0, 150, 255, 0.35));
            }
            85% {
                left: 88%;
                bottom: 16%;
                transform: rotate(-0.5deg) scale(1.01);
                filter: drop-shadow(0 0 28px rgba(0, 150, 255, 0.38));
            }
            100% {
                left: 115%;
                bottom: 15%;
                transform: rotate(0deg) scale(1);
                filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.3));
            }
        }
        
        /* Gentle floating body wave */
        .whale-body {
            animation: gentleFloat 2.2s cubic-bezier(0.45, 0.25, 0.55, 0.75) infinite;
            transform-origin: center;
        }
        
        @keyframes gentleFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        
        /* YOUR whale.svg */
        .whale-svg {
            width: 350px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 15px rgba(0, 100, 200, 0.4));
            transition: filter 0.3s ease;
            image-rendering: smooth;
        }
        
        .whale-container:hover .whale-svg {
            filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.7));
        }
        
        /* ============================================
           SPLASH EFFECTS
           ============================================ */
        
        .splash-effects {
            position: absolute;
            bottom: -15px;
            left: 100px;
            right: 0;
            pointer-events: none;
            z-index: 101;
        }
        
        .splash-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.7), rgba(50, 150, 200, 0.3));
            border-radius: 50%;
            opacity: 0;
            animation: smoothSplash 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }
        
        @keyframes smoothSplash {
            0% {
                transform: scale(0.3) translateY(0);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.3) translateY(-35px);
                opacity: 0;
            }
        }
        
        .splash1 { width: 14px; height: 14px; left: 120px; animation-delay: 0s; }
        .splash2 { width: 10px; height: 10px; left: 145px; animation-delay: 0.15s; }
        .splash3 { width: 18px; height: 18px; left: 165px; animation-delay: 0.25s; }
        .splash4 { width: 8px; height: 8px; left: 190px; animation-delay: 0.35s; }
        .splash5 { width: 12px; height: 12px; left: 210px; animation-delay: 0.1s; }
        .splash6 { width: 6px; height: 6px; left: 235px; animation-delay: 0.45s; }
        
        /* ============================================
           WATER SPRAY FROM BLOWHOLE
           ============================================ */
        
        .spray-container {
            position: absolute;
            top: -30px;
            left: 180px;
            pointer-events: none;
            z-index: 102;
        }
        
        .spray-drop {
            position: absolute;
            background: radial-gradient(circle, #aaddff, #66aaff);
            border-radius: 50%;
            opacity: 0;
            animation: smoothSpray 1.1s cubic-bezier(0.2, 0.9, 0.4, 1.1) infinite;
        }
        
        @keyframes smoothSpray {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-55px) translateX(15px) scale(0.2);
                opacity: 0;
            }
        }
        
        .drop1 { width: 6px; height: 6px; left: 0; animation-delay: 0s; }
        .drop2 { width: 5px; height: 5px; left: 8px; animation-delay: 0.2s; }
        .drop3 { width: 4px; height: 4px; left: -5px; animation-delay: 0.4s; }
        .drop4 { width: 7px; height: 7px; left: 12px; animation-delay: 0.1s; }
        .drop5 { width: 4px; height: 4px; left: 4px; animation-delay: 0.6s; }
        .drop6 { width: 5px; height: 5px; left: -8px; animation-delay: 0.35s; }
        
        /* ============================================
           OCEAN WAVES
           ============================================ */
        
        .ocean-waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: repeating-linear-gradient(
                90deg,
                rgba(0, 80, 120, 0.25),
                rgba(0, 80, 120, 0.25) 80px,
                rgba(0, 60, 100, 0.15) 80px,
                rgba(0, 60, 100, 0.15) 160px
            );
            animation: waveFlow 6s cubic-bezier(0.45, 0.05, 0.2, 0.95) infinite;
            z-index: 1;
            pointer-events: none;
        }
        
        @keyframes waveFlow {
            0% { background-position: 0 0; }
            100% { background-position: 160px 0; }
        }
        
        /* Floating bubbles */
        .bubble {
            position: absolute;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.35), rgba(50, 100, 150, 0.1));
            border-radius: 50%;
            animation: bubbleRise 7s cubic-bezier(0.4, 0.2, 0.6, 0.8) infinite;
            z-index: 0;
        }
        
        @keyframes bubbleRise {
            0% {
                bottom: -50px;
                opacity: 0;
                transform: scale(0.4);
            }
            20% {
                opacity: 0.5;
            }
            80% {
                opacity: 0.5;
            }
            100% {
                bottom: 100%;
                opacity: 0;
                transform: scale(1.2);
            }
        }
        
        /* ============================================
           LOGIN BOX
           ============================================ */
        
        .wrapper {
            position: relative;
            z-index: 200;
            width: 310px;
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 150, 255, 0.35);
            border-radius: 20px;
            padding: 28px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .wrapper:hover {
            border-color: #3399ff;
            box-shadow: 0 8px 40px rgba(51, 153, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .wrapper h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #66ccff, #3399ff, #0066cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .input-box {
            position: relative;
            width: 100%;
            height: 44px;
            margin: 20px 0;
        }
        
        .input-box input {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(51, 153, 255, 0.25);
            border-radius: 40px;
            font-size: 1.3rem;
            color: #fff;
            padding: 12px 45px 12px 20px;
            transition: all 0.3s ease;
        }
        
        .input-box input:focus {
            border-color: #3399ff;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 12px rgba(51, 153, 255, 0.25);
        }
        
        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.45);
            font-size: 1.2rem;
        }
        
        .input-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #3399ff;
            transition: all 0.3s ease;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            margin: -10px 0 18px;
        }
        
        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #bbb;
            transition: color 0.2s ease;
        }
        
        .remember-forgot label:hover {
            color: #3399ff;
        }
        
        .remember-forgot label input {
            width: 14px;
            height: 14px;
            accent-color: #3399ff;
            cursor: pointer;
        }
        
        .remember-forgot a {
            color: #3399ff;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .remember-forgot a:hover {
            color: #66ccff;
            text-decoration: underline;
        }
        
        .btn {
            width: 100%;
            height: 44px;
            background: linear-gradient(135deg, #3399ff, #0066cc);
            border: none;
            border-radius: 40px;
            font-size: 1.4rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 20px rgba(51, 153, 255, 0.4);
            background: linear-gradient(135deg, #44aaff, #1177dd);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 14px;
            font-size: 1.1rem;
            display: none;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .wrapper::before {
            content: '🐋';
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            opacity: 0.6;
            filter: drop-shadow(0 0 5px #3399ff);
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        
        @media (max-width: 768px) {
            .wrapper {
                width: 280px;
                padding: 22px 24px;
            }
            
            .whale-svg {
                width: 220px;
            }
            
            .whale-container {
                transform: scale(0.7);
                transform-origin: bottom left;
            }
            
            .spray-container {
                transform: scale(0.7);
                left: 130px;
                top: -20px;
            }
        }
        
        @media (max-width: 480px) {
            .whale-container {
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>

    <!-- Ocean Waves -->
    <div class="ocean-waves"></div>
    
    <!-- Floating Bubbles -->
    <div class="bubble" style="width: 35px; height: 35px; left: 8%; bottom: -50px; animation-duration: 6.5s;"></div>
    <div class="bubble" style="width: 22px; height: 22px; left: 22%; bottom: -50px; animation-duration: 8s; animation-delay: 1.2s;"></div>
    <div class="bubble" style="width: 45px; height: 45px; left: 45%; bottom: -50px; animation-duration: 7.2s; animation-delay: 2.5s;"></div>
    <div class="bubble" style="width: 18px; height: 18px; left: 68%; bottom: -50px; animation-duration: 9s; animation-delay: 0.8s;"></div>
    <div class="bubble" style="width: 28px; height: 28px; left: 85%; bottom: -50px; animation-duration: 5.8s; animation-delay: 3.2s;"></div>
    <div class="bubble" style="width: 14px; height: 14px; left: 35%; bottom: -50px; animation-duration: 7.8s; animation-delay: 1.8s;"></div>
    <div class="bubble" style="width: 55px; height: 55px; left: 92%; bottom: -50px; animation-duration: 11s; animation-delay: 0.5s;"></div>
    
    <!-- YOUR WHALE SVG -->
    <div class="whale-container">
        <div class="whale-body">
            <img src="whale.svg" alt="Whale" class="whale-svg">
        </div>
        
        <!-- Splash Effects -->
        <div class="splash-effects">
            <div class="splash-particle splash1"></div>
            <div class="splash-particle splash2"></div>
            <div class="splash-particle splash3"></div>
            <div class="splash-particle splash4"></div>
            <div class="splash-particle splash5"></div>
            <div class="splash-particle splash6"></div>
        </div>
        
        <!-- Water Spray -->
        <div class="spray-container">
            <div class="spray-drop drop1"></div>
            <div class="spray-drop drop2"></div>
            <div class="spray-drop drop3"></div>
            <div class="spray-drop drop4"></div>
            <div class="spray-drop drop5"></div>
            <div class="spray-drop drop6"></div>
        </div>
    </div>
    
    <!-- Login Form -->
    <div class="wrapper">
        <form id="loginForm">
            <h1>Ocean Access</h1>
            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox" id="rememberMe"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        const ADMIN_USERNAME = "admin";
        const ADMIN_PASSWORD = "admin123";
        
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true');
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                } else {
                    localStorage.removeItem('rememberMe');
                }
                window.location.href = 'index.html';
            } else {
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = 'Invalid username or password!';
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 2500);
            }
        });
    </script>
</body>
</html>
