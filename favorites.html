<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Favorite Content</title>
    <style>
        .stats-container { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 1.5rem; text-align: center; border: 1px solid rgba(183,75,75,0.3); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); border-color: #b74b4b; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #b74b4b; }
        .stat-label { font-size: 1.2rem; color: #ccc; }
        .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(183,75,75,0.3); padding: 0.5rem 1.5rem; border-radius: 50px; color: white; cursor: pointer; }
        .filter-btn.active, .filter-btn:hover { background: #b74b4b; color: black; }
        .movies-container { max-height: 350px; overflow-y: auto; padding-right: 10px; margin: 1.5rem 0; }
        .movie-item { background: rgba(255,255,255,0.05); padding: 1rem; margin-bottom: 1rem; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .movie-item.watched { opacity: 0.6; }
        .movie-content { flex: 1; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .movie-check { width: 20px; height: 20px; cursor: pointer; accent-color: #b74b4b; }
        .movie-title { font-size: 1.4rem; font-weight: 500; }
        .movie-year { font-size: 1.2rem; color: #888; }
        .movie-rating { color: #ffc107; font-size: 1.2rem; }
        .movie-genre { background: rgba(183,75,75,0.2); padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 1.1rem; }
        .movie-actions button { background: transparent; border: none; cursor: pointer; font-size: 1.4rem; padding: 0.3rem; border-radius: 5px; }
        .add-movie-form { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 15px; margin-top: 1rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 1rem; margin-bottom: 1rem; }
        .form-row input, .form-row select { background: rgba(255,255,255,0.1); border: 1px solid #b74b4b; color: white; padding: 0.8rem; font-size: 1.3rem; border-radius: 8px; }
        .page-title { font-size: 4rem; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.4rem; color: #ccc; margin-bottom: 2rem; }
        .running-cat { display: none !important; }
        @media (max-width: 768px) { .stats-container { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html" class="active">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img"><img src="main.jpg" alt="Prim"></div>
        <div class="home-content">
            <h1 class="page-title">Favorite <span>Content</span></h1>
            <p class="subtitle">🎬 My movie collection</p>
            
            <div class="stats-container">
                <div class="stat-card"><div class="stat-number" id="totalMovies">0</div><div class="stat-label">Total Movies</div></div>
                <div class="stat-card"><div class="stat-number" id="watchedMovies">0</div><div class="stat-label">Watched</div></div>
                <div class="stat-card"><div class="stat-number" id="watchedPercent">0%</div><div class="stat-label">Progress</div></div>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="watched">Watched ✓</button>
                <button class="filter-btn" data-filter="unwatched">Unwatched</button>
            </div>
            
            <div class="movies-container" id="moviesContainer"></div>
            
            <div class="add-movie-form">
                <div class="form-row">
                    <input type="text" id="movieName" placeholder="Movie Name">
                    <input type="number" id="movieYear" placeholder="Year" value="2024">
                    <select id="movieRating"><option value="5">⭐⭐⭐⭐⭐ 5</option><option value="4">⭐⭐⭐⭐ 4</option><option value="3" selected>⭐⭐⭐ 3</option><option value="2">⭐⭐ 2</option><option value="1">⭐ 1</option></select>
                    <select id="movieGenre"><option>Action</option><option>Drama</option><option>Comedy</option><option>Sci-Fi</option><option>Horror</option></select>
                </div>
                <button class="btn" id="addMovieBtn" style="width: 100%;">➕ Add Movie</button>
            </div>
            
            <div class="social-icons">
                <a href="https://linkedin.com/in/prim" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/prim" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://twitter.com/prim" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://instagram.com/prim" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'whale/';
        if (sessionStorage.getItem('isAdmin') === 'true') document.getElementById('adminLink').style.display = 'inline-block';
        
        const SUPABASE_URL = 'https://oskmksbqwanpwtsiqlmt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9za21rc2Jxd2FucHd0c2lxbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzA2OTksImV4cCI6MjA5Mjk0NjY5OX0.ctGblHlU19in0Re9-jFKuYPEL6mokgTcvdGDcpqf4xg';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let movies = [];
        let currentFilter = 'all';
        
        async function loadMovies() {
            const { data, error } = await supabase.from('movies').select('*').order('id', { ascending: false });
            if (error) { console.error('Error loading movies:', error); return; }
            movies = data || [];
            renderMovies();
            updateStats();
        }
        
        function updateStats() {
            const total = movies.length;
            const watched = movies.filter(m => m.watched).length;
            const percent = total > 0 ? Math.round((watched / total) * 100) : 0;
            document.getElementById('totalMovies').textContent = total;
            document.getElementById('watchedMovies').textContent = watched;
            document.getElementById('watchedPercent').textContent = percent + '%';
        }
        
        function getStars(rating) { return '⭐'.repeat(rating) + '☆'.repeat(5 - rating); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function renderMovies() {
            let filtered = movies;
            if (currentFilter === 'watched') filtered = movies.filter(m => m.watched);
            if (currentFilter === 'unwatched') filtered = movies.filter(m => !m.watched);
            const container = document.getElementById('moviesContainer');
            if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:2rem;color:#888;">No movies found</div>'; return; }
            container.innerHTML = filtered.map(m => `
                <div class="movie-item ${m.watched ? 'watched' : ''}">
                    <div class="movie-content">
                        <input type="checkbox" class="movie-check" ${m.watched ? 'checked' : ''} onchange="toggleWatched(${m.id})">
                        <span class="movie-title">${escapeHtml(m.name)}</span>
                        <span class="movie-year">(${m.year})</span>
                        <span class="movie-rating">${getStars(m.rating)}</span>
                        <span class="movie-genre">${m.genre}</span>
                    </div>
                    <div class="movie-actions">
                        <button onclick="editMovie(${m.id})" style="color:#ffc107;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteMovie(${m.id})" style="color:#dc3545;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        async function toggleWatched(id) {
            const movie = movies.find(m => m.id === id);
            if (movie) {
                await supabase.from('movies').update({ watched: !movie.watched }).eq('id', id);
                loadMovies();
            }
        }
        
        async function editMovie(id) {
            const movie = movies.find(m => m.id === id);
            const newName = prompt('Edit movie name:', movie.name);
            if (newName && newName.trim()) {
                await supabase.from('movies').update({ name: newName.trim() }).eq('id', id);
                loadMovies();
            }
        }
        
        async function deleteMovie(id) {
            if (confirm('Delete this movie?')) {
                await supabase.from('movies').delete().eq('id', id);
                loadMovies();
            }
        }
        
        async function addMovie() {
            const name = document.getElementById('movieName').value.trim();
            const year = parseInt(document.getElementById('movieYear').value);
            const rating = parseInt(document.getElementById('movieRating').value);
            const genre = document.getElementById('movieGenre').value;
            if (!name) { alert('Please enter movie name!'); return; }
            await supabase.from('movies').insert([{ name, year, rating, genre, watched: false }]);
            document.getElementById('movieName').value = '';
            loadMovies();
        }
        
        document.getElementById('addMovieBtn').addEventListener('click', addMovie);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });
        loadMovies();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'whale/';
        });
        
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        if (window.innerWidth <= 995) hamburger.style.display = 'block';
        hamburger.addEventListener('click', () => nav.classList.toggle('active'));
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) { hamburger.style.display = 'none'; nav.classList.remove('active'); }
            else hamburger.style.display = 'block';
        });
        document.querySelectorAll('nav a').forEach(link => link.addEventListener('click', () => nav.classList.remove('active')));
    </script>
</body>
</html>
