<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Favorite Content</title>
    <style>
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(183, 75, 75, 0.3);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #b74b4b;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #b74b4b;
        }
        
        .stat-label {
            font-size: 1.2rem;
            color: #ccc;
        }
        
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(183, 75, 75, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: #b74b4b;
            color: black;
            border-color: #b74b4b;
        }
        
        .movies-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
            margin: 1.5rem 0;
        }
        
        .movies-container::-webkit-scrollbar { width: 6px; }
        
        .movie-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: all 0.3s ease;
            border-left: 3px solid #b74b4b;
        }
        
        .movie-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        
        .movie-item.watched {
            opacity: 0.6;
            border-left-color: #00ff00;
        }
        
        .movie-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .movie-check {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #b74b4b;
        }
        
        .movie-title {
            font-size: 1.5rem;
            font-weight: 500;
            min-width: 150px;
        }
        
        .movie-year {
            font-size: 1.3rem;
            color: #888;
        }
        
        .movie-rating {
            color: #ffc107;
            font-size: 1.3rem;
        }
        
        .movie-genre {
            background: rgba(183, 75, 75, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 1.2rem;
        }
        
        .movie-actions {
            display: flex;
            gap: 0.8rem;
        }
        
        .movie-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            padding: 0.5rem;
            border-radius: 8px;
        }
        
        .add-movie-form {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 1rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-row input, .form-row select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #b74b4b;
            color: white;
            padding: 0.8rem;
            font-size: 1.4rem;
            border-radius: 8px;
        }
        
        .form-row input:focus, .form-row select:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(183, 75, 75, 0.3);
        }
        
        .page-title {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1.4rem;
            color: #ccc;
            margin-bottom: 2rem;
        }
        
        .rating-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .rating-input select {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .stats-container { grid-template-columns: 1fr; }
            .movie-content { flex-direction: column; align-items: flex-start; }
            .movie-actions { justify-content: flex-end; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="running-cat">
        <div class="cat-run cat-walk">🐱</div>
        <div class="cpu-meter">
            <div>CPU: <span class="cpu-percent">0</span>%</div>
            <div class="cpu-bar"><div class="cpu-fill"></div></div>
        </div>
    </div>
    
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html" class="active">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1 class="page-title">Favorite <span>Content</span></h1>
            <p class="subtitle">🎬 My movie collection</p>
            
            <div class="stats-container">
                <div class="stat-card"><div class="stat-number" id="totalMovies">0</div><div class="stat-label">Total Movies</div></div>
                <div class="stat-card"><div class="stat-number" id="watchedMovies">0</div><div class="stat-label">Watched</div></div>
                <div class="stat-card"><div class="stat-number" id="watchedPercent">0%</div><div class="stat-label">Progress</div></div>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="watched">Watched ✓</button>
                <button class="filter-btn" data-filter="unwatched">Unwatched</button>
            </div>
            
            <div class="movies-container" id="moviesContainer"></div>
            
            <div class="add-movie-form">
                <div class="form-row">
                    <input type="text" id="movieName" placeholder="Movie Name">
                    <input type="number" id="movieYear" placeholder="Year" value="2024">
                    <div class="rating-input">
                        <select id="movieRating">
                            <option value="5">⭐⭐⭐⭐⭐ 5</option>
                            <option value="4">⭐⭐⭐⭐ 4</option>
                            <option value="3" selected>⭐⭐⭐ 3</option>
                            <option value="2">⭐⭐ 2</option>
                            <option value="1">⭐ 1</option>
                        </select>
                    </div>
                    <select id="movieGenre">
                        <option>Action</option>
                        <option>Drama</option>
                        <option>Comedy</option>
                        <option>Sci-Fi</option>
                        <option>Horror</option>
                        <option>Romance</option>
                        <option>Thriller</option>
                    </select>
                </div>
                <button class="btn" id="addMovieBtn" style="width: 100%;">➕ Add Movie</button>
            </div>
            
            <div class="social-icons" id="socialIcons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
        if (localStorage.getItem('isAdmin') === 'true') document.getElementById('adminLink').style.display = 'inline-block';
        
        let movies = JSON.parse(localStorage.getItem('favoriteMovies')) || [
            { id: 1, name: "Inception", year: 2010, rating: 5, genre: "Sci-Fi", watched: true },
            { id: 2, name: "The Dark Knight", year: 2008, rating: 5, genre: "Action", watched: true },
            { id: 3, name: "Interstellar", year: 2014, rating: 4, genre: "Sci-Fi", watched: false },
            { id: 4, name: "Pulp Fiction", year: 1994, rating: 5, genre: "Drama", watched: true },
            { id: 5, name: "The Matrix", year: 1999, rating: 5, genre: "Sci-Fi", watched: false }
        ];
        
        let currentFilter = 'all';
        
        function saveMovies() {
            localStorage.setItem('favoriteMovies', JSON.stringify(movies));
            renderMovies();
            updateStats();
        }
        
        function updateStats() {
            const total = movies.length;
            const watched = movies.filter(m => m.watched).length;
            const percent = total > 0 ? Math.round((watched / total) * 100) : 0;
            document.getElementById('totalMovies').textContent = total;
            document.getElementById('watchedMovies').textContent = watched;
            document.getElementById('watchedPercent').textContent = percent + '%';
        }
        
        function getStars(rating) {
            return '⭐'.repeat(rating) + '☆'.repeat(5 - rating);
        }
        
        function renderMovies() {
            let filteredMovies = movies;
            if (currentFilter === 'watched') filteredMovies = movies.filter(m => m.watched);
            if (currentFilter === 'unwatched') filteredMovies = movies.filter(m => !m.watched);
            
            const container = document.getElementById('moviesContainer');
            if (filteredMovies.length === 0) {
                container.innerHTML = `<div class="empty-state" style="text-align:center;padding:2rem;"><i class="fas fa-film"></i><p>No movies found</p></div>`;
                return;
            }
            
            container.innerHTML = filteredMovies.map(movie => `
                <div class="movie-item ${movie.watched ? 'watched' : ''}">
                    <div class="movie-content">
                        <input type="checkbox" class="movie-check" ${movie.watched ? 'checked' : ''} onchange="toggleWatched(${movie.id})">
                        <span class="movie-title">${escapeHtml(movie.name)}</span>
                        <span class="movie-year">(${movie.year})</span>
                        <span class="movie-rating">${getStars(movie.rating)}</span>
                        <span class="movie-genre">${movie.genre}</span>
                    </div>
                    <div class="movie-actions">
                        <button class="edit-btn" onclick="editMovie(${movie.id})"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteMovie(${movie.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleWatched(id) {
            const movie = movies.find(m => m.id === id);
            if (movie) movie.watched = !movie.watched;
            saveMovies();
        }
        
        function deleteMovie(id) {
            if (confirm('Delete this movie?')) {
                movies = movies.filter(m => m.id !== id);
                saveMovies();
            }
        }
        
        function editMovie(id) {
            const movie = movies.find(m => m.id === id);
            const newName = prompt('Edit movie name:', movie.name);
            if (newName && newName.trim()) movie.name = newName.trim();
            saveMovies();
        }
        
        function addMovie() {
            const name = document.getElementById('movieName').value.trim();
            const year = parseInt(document.getElementById('movieYear').value);
            const rating = parseInt(document.getElementById('movieRating').value);
            const genre = document.getElementById('movieGenre').value;
            
            if (!name) { alert('Please enter movie name!'); return; }
            
            const newId = Math.max(...movies.map(m => m.id), 0) + 1;
            movies.push({ id: newId, name, year, rating, genre, watched: false });
            document.getElementById('movieName').value = '';
            saveMovies();
        }
        
        document.getElementById('addMovieBtn').addEventListener('click', addMovie);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });
        
        renderMovies();
        updateStats();
        
        // ========== RUNNING CAT ==========
        let cpu = 0, dir = 1;
        const catEl = document.querySelector('.cat-run');
        function updateCPU() {
            cpu += dir * (Math.random() * 10);
            if (cpu >= 100) { cpu = 100; dir = -1; }
            else if (cpu <= 0) { cpu = 0; dir = 1; }
            document.querySelector('.cpu-percent').textContent = Math.floor(cpu);
            document.querySelector('.cpu-fill').style.width = Math.floor(cpu) + '%';
            let p = Math.floor(cpu);
            if (p < 20) { catEl.className = 'cat-run cat-walk'; catEl.textContent = '🐱'; }
            else if (p < 40) { catEl.className = 'cat-run cat-jog'; catEl.textContent = '🐱‍🏃'; }
            else if (p < 60) { catEl.className = 'cat-run cat-run'; catEl.textContent = '🐈‍⬛'; }
            else if (p < 80) { catEl.className = 'cat-run cat-sprint'; catEl.textContent = '🐈‍⬛💨'; }
            else { catEl.className = 'cat-run cat-zoom'; catEl.textContent = '💨😾💨'; }
            setTimeout(updateCPU, 500);
        }
        updateCPU();
        
        function loadSocialLinks() {
            const links = JSON.parse(localStorage.getItem('socialLinks')) || { linkedin: '#', github: '#', twitter: '#', instagram: '#' };
            const icons = document.querySelectorAll('.social-icons a');
            if (icons[0]) icons[0].href = links.linkedin;
            if (icons[1]) icons[1].href = links.github;
            if (icons[2]) icons[2].href = links.twitter;
            if (icons[3]) icons[3].href = links.instagram;
        }
        loadSocialLinks();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); window.location.href = 'login.html'; });
        
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        if (window.innerWidth <= 995) hamburger.style.display = 'block';
        hamburger.addEventListener('click', () => nav.classList.toggle('active'));
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) { hamburger.style.display = 'none'; nav.classList.remove('active'); }
            else hamburger.style.display = 'block';
        });
        document.querySelectorAll('nav a').forEach(link => link.addEventListener('click', () => nav.classList.remove('active')));
    </script>
</body>
</html>
