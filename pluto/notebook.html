<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Notebook</title>
    <style>
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .page-title span {
            color: #b74b4b;
        }
        .notebook-container {
            max-height: 400px;
            overflow-y: auto;
            margin: 2rem 0;
        }
        .note-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            border-left: 3px solid #b74b4b;
            transition: all 0.3s ease;
        }
        .note-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }
        .note-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #b74b4b;
            margin-bottom: 0.5rem;
        }
        .note-body {
            font-size: 1.4rem;
            color: #ccc;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
        }
        .note-date {
            font-size: 1.1rem;
            color: #666;
            margin-top: 0.5rem;
        }
        .note-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.5rem;
            justify-content: flex-end;
        }
        .note-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            padding: 0.3rem;
            border-radius: 5px;
        }
        .add-note-form {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }
        .add-note-form input, .add-note-form textarea {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #b74b4b;
            border-radius: 10px;
            color: white;
            font-size: 1.4rem;
        }
        .add-note-form textarea {
            min-height: 100px;
            resize: vertical;
        }
        .running-cat {
            display: none !important;
        }
        @media (max-width: 768px) {
            .note-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none; font-size: 30px; cursor: pointer;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1 class="page-title">My <span>Notebook</span></h1>
            
            <div class="add-note-form">
                <input type="text" id="noteTitle" placeholder="Note Title">
                <textarea id="noteBody" placeholder="Write your note here..."></textarea>
                <button class="btn" id="addNoteBtn" style="padding: 1rem 2rem;">➕ Add Note</button>
            </div>
            
            <div class="notebook-container" id="notesContainer"></div>
            
            <div class="social-icons">
                <a href="https://linkedin.com/in/prim" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/prim" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://twitter.com/prim" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://instagram.com/prim" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script>
        // ========== LOGIN CHECK ==========
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'whale/';
        }
        
        if (sessionStorage.getItem('isAdmin') === 'true') {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
        
        // ========== NOTEBOOK DATA (sessionStorage) ==========
        let notes = JSON.parse(sessionStorage.getItem('notebookNotes')) || [];
        let currentEditId = null;
        
        function saveNotes() {
            sessionStorage.setItem('notebookNotes', JSON.stringify(notes));
            renderNotes();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderNotes() {
            const container = document.getElementById('notesContainer');
            if (notes.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#888;"><i class="fas fa-book-open"></i><p>No notes yet. Write your first note above!</p></div>';
                return;
            }
            
            container.innerHTML = notes.map(note => `
                <div class="note-card" data-id="${note.id}">
                    <div class="note-title">📝 ${escapeHtml(note.title)}</div>
                    <div class="note-body">${escapeHtml(note.body)}</div>
                    <div class="note-date">📅 ${note.date}</div>
                    <div class="note-actions">
                        <button class="edit-note-btn" onclick="editNote(${note.id})" style="color:#ffc107;"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-note-btn" onclick="deleteNote(${note.id})" style="color:#dc3545;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const body = document.getElementById('noteBody').value.trim();
            
            if (!title && !body) {
                alert('Please enter a title or content for your note!');
                return;
            }
            
            const newId = notes.length > 0 ? Math.max(...notes.map(n => n.id)) + 1 : 1;
            const date = new Date().toLocaleString();
            
            notes.unshift({
                id: newId,
                title: title || 'Untitled',
                body: body || 'No content',
                date: date
            });
            
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteBody').value = '';
            saveNotes();
        }
        
        function editNote(id) {
            const note = notes.find(n => n.id === id);
            const newTitle = prompt('Edit title:', note.title);
            const newBody = prompt('Edit content:', note.body);
            
            if (newTitle !== null) note.title = newTitle.trim() || 'Untitled';
            if (newBody !== null) note.body = newBody.trim() || 'No content';
            saveNotes();
        }
        
        function deleteNote(id) {
            if (confirm('Delete this note? This cannot be undone.')) {
                notes = notes.filter(n => n.id !== id);
                saveNotes();
            }
        }
        
        document.getElementById('addNoteBtn').addEventListener('click', addNote);
        
        // Allow Enter key in title field
        document.getElementById('noteTitle').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addNote();
            }
        });
        
        renderNotes();
        
        // ========== LOGOUT ==========
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'whale/';
        });
        
        // ========== MOBILE MENU ==========
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        
        if (window.innerWidth <= 995 && hamburger) {
            hamburger.style.display = 'block';
        }
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                nav.classList.toggle('active');
            });
        }
        
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) {
                if (hamburger) hamburger.style.display = 'none';
                if (nav) nav.classList.remove('active');
            } else {
                if (hamburger) hamburger.style.display = 'block';
            }
        });
        
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                if (nav) nav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
