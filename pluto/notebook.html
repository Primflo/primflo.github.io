<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Death Note - Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Transparent Background Image */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('pluto/dra.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Death Note Container */
        .death-note {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #8b0000;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
            animation: glowPulse 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(139, 0, 0, 0.4); }
            50% { box-shadow: 0 0 50px rgba(220, 53, 69, 0.7); }
        }

        /* Header */
        .death-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #8b0000;
            padding-bottom: 15px;
        }

        .death-header h1 {
            font-size: 2.5rem;
            color: #dc3545;
            text-shadow: 0 0 10px #ff0000;
        }

        .death-header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Add Note Section */
        .add-section {
            background: rgba(139, 0, 0, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #8b0000;
        }

        .add-section h3 {
            color: #dc3545;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #8b0000;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.5);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-add {
            background: linear-gradient(135deg, #8b0000, #dc3545);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }

        /* Notes List */
        .notes-section {
            margin-top: 30px;
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .notes-header h3 {
            color: #dc3545;
            font-size: 1.5rem;
        }

        .btn-delete-all {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete-all:hover {
            background: #dc3545;
            color: white;
        }

        /* Note Card */
        .note-card {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #dc3545;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .note-card:hover {
            background: rgba(139, 0, 0, 0.2);
            transform: translateX(5px);
        }

        .note-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545;
            text-shadow: 0 0 5px #ff0000;
            margin-bottom: 10px;
        }

        .note-body {
            color: #ccc;
            margin: 10px 0;
            white-space: pre-wrap;
        }

        .note-date {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        /* Comments Section */
        .note-comments {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .note-comments h4 {
            color: #dc3545;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 0.8rem;
            color: #ccc;
        }

        .comment-author {
            color: #dc3545;
            font-weight: bold;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .add-comment input {
            flex: 1;
            padding: 8px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #8b0000;
            border-radius: 5px;
            color: white;
            font-size: 0.8rem;
        }

        .add-comment button {
            background: #8b0000;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Note Actions */
        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .note-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-edit { color: #ffc107; }
        .btn-delete { color: #dc3545; }

        /* Shinigami Eyes Glow */
        .shinigami-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(220, 53, 69, 0.1), transparent);
            z-index: 999;
            animation: eyeGlow 4s ease-in-out infinite;
        }

        @keyframes eyeGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.5; }
        }

        /* Navigation Links */
        .nav-links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #8b0000;
        }

        .nav-links a {
            color: #dc3545;
            text-decoration: none;
            margin: 0 15px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            text-shadow: 0 0 10px #ff0000;
        }

        .empty-message {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        @media (max-width: 600px) {
            .death-note { padding: 20px; }
            .note-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="shinigami-glow"></div>

    <div class="death-note">
        <div class="death-header">
            <h1>📓 DEATH NOTE 📓</h1>
            <p>The human whose name is written in this note shall die...</p>
        </div>

        <!-- Add Note Section -->
        <div class="add-section">
            <h3><i class="fas fa-pen"></i> Write in the Death Note</h3>
            <div class="form-group">
                <input type="text" id="noteTitle" placeholder="Title / Name">
            </div>
            <div class="form-group">
                <textarea id="noteBody" placeholder="Write the details here..."></textarea>
            </div>
            <button class="btn-add" id="addNoteBtn">
                <i class="fas fa-skull"></i> Write in Death Note
            </button>
        </div>

        <!-- Notes List -->
        <div class="notes-section">
            <div class="notes-header">
                <h3><i class="fas fa-list"></i> The Death List</h3>
                <button class="btn-delete-all" id="deleteAllBtn">
                    <i class="fas fa-trash-alt"></i> Remove All
                </button>
            </div>
            <div id="notesContainer"></div>
        </div>

        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <script>
        // ========== LOGIN CHECK ==========
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'whale/';
        }

        // ========== DEATH NOTE DATA ==========
        let deathNotes = JSON.parse(sessionStorage.getItem('deathNotes')) || [];

        function saveNotes() {
            sessionStorage.setItem('deathNotes', JSON.stringify(deathNotes));
            renderNotes();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            
            if (deathNotes.length === 0) {
                container.innerHTML = '<div class="empty-message"><i class="fas fa-book"></i><p>The Death Note is empty... Who will be next?</p></div>';
                return;
            }

            container.innerHTML = deathNotes.map(note => `
                <div class="note-card" data-id="${note.id}">
                    <div class="note-title">✍️ ${escapeHtml(note.title)}</div>
                    <div class="note-body">📝 ${escapeHtml(note.body)}</div>
                    <div class="note-date">📅 ${note.date || 'Unknown date'}</div>
                    
                    <div class="note-comments">
                        <h4><i class="fas fa-comments"></i> Comments (${note.comments ? note.comments.length : 0})</h4>
                        ${note.comments && note.comments.length > 0 ? note.comments.map(comment => `
                            <div class="comment-item">
                                <span class="comment-author">👤 ${escapeHtml(comment.author)}:</span> ${escapeHtml(comment.text)}
                                <small style="color:#666;"> (${comment.date})</small>
                            </div>
                        `).join('') : '<div style="color:#666; font-size:0.8rem;">No comments yet.</div>'}
                        
                        <div class="add-comment">
                            <input type="text" id="commentAuthor_${note.id}" placeholder="Your name" maxlength="20">
                            <input type="text" id="commentText_${note.id}" placeholder="Add a comment...">
                            <button onclick="addComment(${note.id})">Post</button>
                        </div>
                    </div>
                    
                    <div class="note-actions">
                        <button class="btn-edit" onclick="editNote(${note.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteNote(${note.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const body = document.getElementById('noteBody').value.trim();

            if (!title && !body) {
                alert('Please enter a title or content!');
                return;
            }

            const newId = deathNotes.length > 0 ? Math.max(...deathNotes.map(n => n.id)) + 1 : 1;
            
            deathNotes.unshift({
                id: newId,
                title: title || 'Untitled',
                body: body || 'No content',
                date: new Date().toLocaleString(),
                comments: []
            });

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteBody').value = '';
            saveNotes();
        }

        function editNote(id) {
            const note = deathNotes.find(n => n.id === id);
            const newTitle = prompt('Edit title:', note.title);
            const newBody = prompt('Edit content:', note.body);
            
            if (newTitle !== null && newTitle.trim()) note.title = newTitle.trim();
            if (newBody !== null) note.body = newBody.trim() || 'No content';
            saveNotes();
        }

        function deleteNote(id) {
            if (confirm('Remove this from the Death Note?')) {
                deathNotes = deathNotes.filter(n => n.id !== id);
                saveNotes();
            }
        }

        function addComment(id) {
            const authorInput = document.getElementById(`commentAuthor_${id}`);
            const textInput = document.getElementById(`commentText_${id}`);
            const author = authorInput.value.trim();
            const text = textInput.value.trim();
            
            if (!author) {
                alert('Please enter your name');
                return;
            }
            if (!text) {
                alert('Please enter a comment');
                return;
            }
            
            const note = deathNotes.find(n => n.id === id);
            if (!note.comments) note.comments = [];
            
            note.comments.push({
                author: author,
                text: text,
                date: new Date().toLocaleString()
            });
            
            authorInput.value = '';
            textInput.value = '';
            saveNotes();
        }

        function deleteAllNotes() {
            if (confirm('⚠️ THIS CANNOT BE UNDONE! ⚠️\n\nDelete ALL entries from the Death Note?')) {
                deathNotes = [];
                saveNotes();
            }
        }

        // ========== LOGOUT ==========
        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            window.location.href = 'whale/';
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('addNoteBtn').addEventListener('click', addNote);
        document.getElementById('deleteAllBtn').addEventListener('click', deleteAllNotes);
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });

        // Initialize
        renderNotes();
    </script>
</body>
</html>
