<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Notebook</title>
    <style>
        .page-title { font-size: 4rem; margin-bottom: 1rem; }
        .page-title span { color: #b74b4b; }
        .notebook-container { max-height: 400px; overflow-y: auto; margin: 2rem 0; }
        .note-card { background: rgba(255,255,255,0.05); padding: 1.2rem; margin-bottom: 1rem; border-radius: 12px; border-left: 3px solid #b74b4b; transition: all 0.3s ease; }
        .note-card:hover { transform: translateX(5px); background: rgba(255,255,255,0.08); }
        .note-title { font-size: 1.8rem; font-weight: bold; color: #b74b4b; margin-bottom: 0.5rem; }
        .note-body { font-size: 1.4rem; color: #ccc; margin-bottom: 0.5rem; white-space: pre-wrap; }
        .note-date { font-size: 1.1rem; color: #666; margin-top: 0.5rem; }
        .note-actions { display: flex; gap: 0.8rem; margin-top: 0.5rem; justify-content: flex-end; }
        .note-actions button { background: transparent; border: none; cursor: pointer; font-size: 1.4rem; padding: 0.3rem; border-radius: 5px; }
        .add-note-form { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 15px; margin-bottom: 2rem; display: flex; gap: 1rem; flex-direction: column; }
        .add-note-form input, .add-note-form textarea { padding: 1rem; background: rgba(255,255,255,0.1); border: 1px solid #b74b4b; border-radius: 10px; color: white; font-size: 1.4rem; }
        .add-note-form textarea { min-height: 100px; resize: vertical; }
        .running-cat { display: none !important; }
        @media (max-width: 768px) { .note-title { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img"><img src="main.jpg" alt="Prim"></div>
        <div class="home-content">
            <h1 class="page-title">My <span>Notebook</span></h1>
            
            <div class="add-note-form">
                <input type="text" id="noteTitle" placeholder="Note Title">
                <textarea id="noteBody" placeholder="Write your note here..."></textarea>
                <button class="btn" id="addNoteBtn" style="padding: 1rem 2rem;">➕ Add Note</button>
            </div>
            
            <div class="notebook-container" id="notesContainer"></div>
            
            <div class="social-icons">
                <a href="https://linkedin.com/in/prim" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://github.com/prim" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://twitter.com/prim" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://instagram.com/prim" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'whale/';
        if (sessionStorage.getItem('isAdmin') === 'true') document.getElementById('adminLink').style.display = 'inline-block';
        
        const SUPABASE_URL = 'https://oskmksbqwanpwtsiqlmt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9za21rc2Jxd2FucHd0c2lxbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzA2OTksImV4cCI6MjA5Mjk0NjY5OX0.ctGblHlU19in0Re9-jFKuYPEL6mokgTcvdGDcpqf4xg';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let notes = [];
        
        async function loadNotes() {
            const { data, error } = await supabase.from('notes').select('*').order('id', { ascending: false });
            if (error) { console.error('Error loading notes:', error); return; }
            notes = data || [];
            renderNotes();
        }
        
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function renderNotes() {
            const container = document.getElementById('notesContainer');
            if (notes.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#888;">No notes yet. Add your first note above!</div>';
                return;
            }
            container.innerHTML = notes.map(note => `
                <div class="note-card">
                    <div class="note-title">📝 ${escapeHtml(note.title)}</div>
                    <div class="note-body">${escapeHtml(note.body)}</div>
                    <div class="note-date">📅 ${note.date || new Date().toLocaleString()}</div>
                    <div class="note-actions">
                        <button onclick="editNote(${note.id})" style="color:#ffc107;"><i class="fas fa-edit"></i> Edit</button>
                        <button onclick="deleteNote(${note.id})" style="color:#dc3545;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const body = document.getElementById('noteBody').value.trim();
            if (!title && !body) { alert('Please enter a title or content!'); return; }
            const date = new Date().toLocaleString();
            await supabase.from('notes').insert([{ title: title || 'Untitled', body: body || 'No content', date }]);
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteBody').value = '';
            loadNotes();
        }
        
        async function editNote(id) {
            const note = notes.find(n => n.id === id);
            const newTitle = prompt('Edit title:', note.title);
            const newBody = prompt('Edit content:', note.body);
            if (newTitle && newTitle.trim()) {
                await supabase.from('notes').update({ title: newTitle.trim() }).eq('id', id);
            }
            if (newBody && newBody.trim()) {
                await supabase.from('notes').update({ body: newBody.trim() }).eq('id', id);
            }
            loadNotes();
        }
        
        async function deleteNote(id) {
            if (confirm('Delete this note?')) {
                await supabase.from('notes').delete().eq('id', id);
                loadNotes();
            }
        }
        
        document.getElementById('addNoteBtn').addEventListener('click', addNote);
        loadNotes();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'whale/';
        });
        
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        if (window.innerWidth <= 995) hamburger.style.display = 'block';
        hamburger.addEventListener('click', () => nav.classList.toggle('active'));
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) { hamburger.style.display = 'none'; nav.classList.remove('active'); }
            else hamburger.style.display = 'block';
        });
        document.querySelectorAll('nav a').forEach(link => link.addEventListener('click', () => nav.classList.remove('active')));
    </script>
</body>
</html>
