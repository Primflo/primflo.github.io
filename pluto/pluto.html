<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <title>Prim - Pluto</title>
    <style>
        /* Hide cat widget */
        .running-cat {
            display: none !important;
        }
        
        /* Black background */
        body {
            background: #000000;
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">Prim</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../services.html">Services</a>
            <a href="../skills.html">Skills</a>
            <a href="../education.html">Education</a>
            <a href="../experience.html">Experience</a>
            <a href="../deathlist.html">List of Death</a>
            <a href="../favorites.html">Favorite Content</a>
            <a href="../contact.html">Contact</a>
            <a href="pluto.html" class="active">Pluto</a>
            <a href="../admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none; font-size: 30px; cursor: pointer;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="../main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1>Welcome to <span>Pluto</span></h1>
            <h3>The Dwarf Planet</h3>
            <p>Pluto is a dwarf planet in the Kuiper belt, a ring of bodies beyond Neptune. It was the first and largest Kuiper belt object to be discovered.</p>
            <div class="social-icons" id="socialIcons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script>
        // ========== LOGIN CHECK ==========
        // Check main login
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '../whale/';
        }
        
        // Check Pluto login for this specific page
        if (localStorage.getItem('isPlutoLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
        
        // Show admin link if admin
        if (localStorage.getItem('isAdmin') === 'true') {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
        
        // ========== LOAD SOCIAL LINKS ==========
        function loadSocialLinks() {
            const socialLinks = JSON.parse(localStorage.getItem('socialLinks')) || {
                linkedin: '#', github: '#', twitter: '#', instagram: '#'
            };
            const icons = document.querySelectorAll('.social-icons a');
            if (icons[0]) icons[0].href = socialLinks.linkedin;
            if (icons[1]) icons[1].href = socialLinks.github;
            if (icons[2]) icons[2].href = socialLinks.twitter;
            if (icons[3]) icons[3].href = socialLinks.instagram;
        }
        loadSocialLinks();
        
        // ========== LOGOUT ==========
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('isPlutoLoggedIn');
            window.location.href = '../whale/';
        });
        
        // ========== MOBILE MENU ==========
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        
        if (window.innerWidth <= 995 && hamburger) {
            hamburger.style.display = 'block';
        }
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                nav.classList.toggle('active');
            });
        }
        
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) {
                if (hamburger) hamburger.style.display = 'none';
                if (nav) nav.classList.remove('active');
            } else {
                if (hamburger) hamburger.style.display = 'block';
            }
        });
        
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                if (nav) nav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
