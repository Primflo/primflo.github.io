<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - Skills</title>
    <style>
        .skills-container {
            width: 100%;
            margin: 2rem 0;
        }
        
        .skill-item {
            margin-bottom: 2.5rem;
        }
        
        .skill-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.6rem;
        }
        
        .skill-name {
            color: #b74b4b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .skill-name i {
            font-size: 2rem;
        }
        
        .skill-percent {
            color: #ccc;
            font-weight: 500;
        }
        
        .skill-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #b74b4b, #ff6b6b, #b74b4b);
            background-size: 200% 100%;
            border-radius: 50px;
            width: 0;
            animation: fillBar 1.5s ease forwards, gradientMove 2s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes fillBar {
            from { width: 0; }
            to { width: var(--width); }
        }
        
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .skill-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }
        
        @keyframes shine {
            to { left: 100%; }
        }
        
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .page-title span {
            color: #b74b4b;
        }
        
        .poet-line {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            font-weight: 600;
            min-width: 280px;
        }
        
        .poet-line span {
            color: #b74b4b;
            position: relative;
        }
        
        .poet-line span::before {
            content: "Code Master";
            color: #b74b4b;
            animation: skillsWords 15s infinite;
        }
        
        .poet-line span::after {
            content: "";
            background-color: black;
            position: absolute;
            width: calc(100% + 8px);
            height: 100%;
            border-left: 3px solid black;
            right: -8;
            animation: cursor 0.6s infinite;
        }
        
        @keyframes cursor {
            to { border-left: 3px solid #b74b4b; }
        }
        
        @keyframes skillsWords {
            0%, 25% { content: "🏆 Code Master"; }
            26%, 50% { content: "🐛 Bug Hunter"; }
            51%, 75% { content: "🔧 Tech Expert"; }
            76%, 100% { content: "⚡ Problem Solver"; }
        }
        
        @media (max-width: 995px) {
            .poet-line { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="running-cat">
        <div class="cat-run cat-walk">🐱</div>
        <div class="cpu-meter">
            <div>CPU: <span class="cpu-percent">0</span>%</div>
            <div class="cpu-bar"><div class="cpu-fill"></div></div>
        </div>
    </div>
    
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="skills.html" class="active">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="deathlist.html">List of Death</a>
            <a href="favorites.html">Favorite Content</a>
            <a href="contact.html">Contact</a>
            <a href="pluto.html">Pluto</a>
            <a href="admin.html" id="adminLink" style="display: none;">Admin</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
        <div class="hamburger" style="display: none;">☰</div>
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1 class="page-title">My <span>Skills</span></h1>
            <h3 class="poet-line">I'm a <span></span></h3>
            
            <div class="skills-container">
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fab fa-html5"></i> HTML5</div>
                        <div class="skill-percent">95%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 95%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fab fa-css3-alt"></i> CSS3</div>
                        <div class="skill-percent">90%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 90%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fab fa-js"></i> JavaScript</div>
                        <div class="skill-percent">88%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 88%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fab fa-react"></i> React</div>
                        <div class="skill-percent">85%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 85%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fab fa-python"></i> Python</div>
                        <div class="skill-percent">80%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 80%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <div class="skill-name"><i class="fas fa-database"></i> SQL</div>
                        <div class="skill-percent">75%</div>
                    </div>
                    <div class="skill-bar-container">
                        <div class="skill-progress" style="--width: 75%"></div>
                    </div>
                </div>
            </div>
            
            <div class="social-icons" id="socialIcons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
            <button class="btn" onclick="location.href='contact.html'">Hire Me</button>
        </div>
    </section>
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
        if (localStorage.getItem('isAdmin') === 'true') document.getElementById('adminLink').style.display = 'inline-block';
        
        let cpu = 0, dir = 1;
        const catEl = document.querySelector('.cat-run');
        function updateCPU() {
            cpu += dir * (Math.random() * 10);
            if (cpu >= 100) { cpu = 100; dir = -1; }
            else if (cpu <= 0) { cpu = 0; dir = 1; }
            document.querySelector('.cpu-percent').textContent = Math.floor(cpu);
            document.querySelector('.cpu-fill').style.width = Math.floor(cpu) + '%';
            let p = Math.floor(cpu);
            if (p < 20) { catEl.className = 'cat-run cat-walk'; catEl.textContent = '🐱'; }
            else if (p < 40) { catEl.className = 'cat-run cat-jog'; catEl.textContent = '🐱‍🏃'; }
            else if (p < 60) { catEl.className = 'cat-run cat-run'; catEl.textContent = '🐈‍⬛'; }
            else if (p < 80) { catEl.className = 'cat-run cat-sprint'; catEl.textContent = '🐈‍⬛💨'; }
            else { catEl.className = 'cat-run cat-zoom'; catEl.textContent = '💨😾💨'; }
            setTimeout(updateCPU, 500);
        }
        updateCPU();
        
        function loadSocialLinks() {
            const links = JSON.parse(localStorage.getItem('socialLinks')) || { linkedin: '#', github: '#', twitter: '#', instagram: '#' };
            const icons = document.querySelectorAll('.social-icons a');
            if (icons[0]) icons[0].href = links.linkedin;
            if (icons[1]) icons[1].href = links.github;
            if (icons[2]) icons[2].href = links.twitter;
            if (icons[3]) icons[3].href = links.instagram;
        }
        loadSocialLinks();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); window.location.href = 'login.html'; });
        
        const hamburger = document.querySelector('.hamburger');
        const nav = document.querySelector('nav');
        if (window.innerWidth <= 995) hamburger.style.display = 'block';
        hamburger.addEventListener('click', () => nav.classList.toggle('active'));
        window.addEventListener('resize', () => {
            if (window.innerWidth > 995) { hamburger.style.display = 'none'; nav.classList.remove('active'); }
            else hamburger.style.display = 'block';
        });
        document.querySelectorAll('nav a').forEach(link => link.addEventListener('click', () => nav.classList.remove('active')));
    </script>
</body>
</html>
