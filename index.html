<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CrystalNote | Rotating Bg Notepad</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'SF Pro Text', -apple-system, 'Inter', system-ui, sans-serif;
    }

    /* BODY: background will be set dynamically via JS (rotating images) */
    body {
      min-height: 100vh;
      background: #0a0f1a;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.8s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    /* fallback overlay to keep text readable on any image */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 12, 25, 0.55);
      backdrop-filter: blur(3px);
      pointer-events: none;
      z-index: 0;
    }

    /* main app container — fully transparent glass */
    .app-container {
      width: 1400px;
      max-width: 98vw;
      background: rgba(18, 22, 38, 0.55);
      backdrop-filter: blur(18px) saturate(170%);
      border-radius: 52px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5);
      padding: 28px 32px;
      transition: all 0.2s;
      position: relative;
      z-index: 2;
    }

    /* header */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .title-area h1 {
      font-weight: 700;
      font-size: 1.9rem;
      background: linear-gradient(135deg, #FFFFFF, #B8E1FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .title-area p {
      color: rgba(255,255,240,0.8);
      font-size: 0.85rem;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .glass-btn {
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.3);
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .glass-btn:hover {
      background: rgba(255,255,255,0.28);
      transform: translateY(-2px);
    }
    .bg-controls {
      display: flex;
      gap: 10px;
      margin-left: 10px;
    }
    /* stats */
    .stats-bar {
      display: flex;
      gap: 28px;
      background: rgba(0,0,0,0.3);
      border-radius: 60px;
      padding: 10px 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
    }
    .stat-item {
      color: #f0f0f0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* editor panel */
    .editor-panel {
      background: rgba(10, 14, 26, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 36px;
      padding: 22px 26px;
      margin-bottom: 32px;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .editor-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: white;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 18px;
    }
    .input-row input, .input-row textarea {
      flex: 1;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 32px;
      padding: 12px 20px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .input-row input:focus, .input-row textarea:focus {
      border-color: #72b0ff;
      box-shadow: 0 0 12px rgba(114,176,255,0.3);
    }
    textarea {
      resize: vertical;
      min-height: 110px;
      font-family: inherit;
    }
    .editor-actions {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
    }
    .primary-btn {
      background: #2c6e9e;
      border: none;
      border-radius: 40px;
      padding: 10px 26px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .secondary-btn {
      background: rgba(100,100,120,0.6);
      border: none;
      border-radius: 40px;
      padding: 10px 26px;
      color: #eee;
    }
    /* notes grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 22px;
      margin-top: 12px;
    }
    .note-card {
      background: rgba(28, 32, 48, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 34px;
      padding: 20px 22px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, background 0.2s;
    }
    .note-card:hover {
      transform: translateY(-5px);
      background: rgba(40, 45, 65, 0.8);
      border-color: rgba(255,255,255,0.35);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
      padding-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .note-title {
      font-weight: 700;
      font-size: 1.2rem;
      color: #ffffffec;
      word-break: break-word;
    }
    .note-date {
      font-size: 0.7rem;
      color: #c8ddff;
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 40px;
    }
    .note-body {
      color: #e9efff;
      line-height: 1.45;
      margin: 14px 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 150px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 14px;
      margin-top: 14px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: #c1ddff;
      font-size: 1rem;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .empty-notes {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,240,0.7);
      font-style: italic;
      background: rgba(0,0,0,0.3);
      border-radius: 48px;
      backdrop-filter: blur(8px);
    }
    .bg-toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      color: #bbf0ff;
      z-index: 99;
      pointer-events: none;
      font-weight: 500;
    }
    footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }
    @media (max-width: 700px) {
      .app-container { padding: 18px; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="top-header">
    <div class="title-area">
      <h1><i class="fas fa-leaf"></i> CrystalNote · Rotating Bg</h1>
      <p>transparent notepad • images from /images/ • full note features</p>
    </div>
    <div class="action-buttons">
      <button class="glass-btn" id="newNoteBtn"><i class="fas fa-plus-circle"></i> New Note</button>
      <button class="glass-btn" id="rotateBgNowBtn"><i class="fas fa-sync-alt"></i> Next Background</button>
      <button class="glass-btn" id="deleteAllNotesBtn"><i class="fas fa-trash-alt"></i> Clear All</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><i class="fas fa-sticky-note"></i> <span id="totalNotesCount">0</span> notes</div>
    <div class="stat-item"><i class="fas fa-image"></i> <span id="activeBgName">/images/</span></div>
    <div class="stat-item"><i class="fas fa-database"></i> local vault</div>
  </div>

  <!-- EDITOR PANEL (full notepad) -->
  <div class="editor-panel" id="editorPanel" style="display: none;">
    <div class="editor-title">
      <i class="fas fa-feather-alt"></i> 
      <span id="editorModeText">✍️ Compose note</span>
    </div>
    <div class="input-row">
      <input type="text" id="noteTitleInput" placeholder="Note title ..." autocomplete="off">
    </div>
    <div class="input-row">
      <textarea id="noteBodyInput" placeholder="Write anything — ideas, tasks, journal, lists... (full notepad features)"></textarea>
    </div>
    <div class="editor-actions">
      <button class="primary-btn" id="saveNoteBtn"><i class="fas fa-save"></i> Save Note</button>
      <button class="secondary-btn" id="cancelEditBtn"><i class="fas fa-times"></i> Cancel</button>
    </div>
  </div>

  <!-- NOTES DISPLAY -->
  <div id="notesContainer" class="notes-grid"></div>
  <footer><i class="fas fa-moon"></i> pure notepad • images from /images/image1.jpeg, image2.jpeg... (auto cycles every 30s) • all data saved locally</footer>
</div>
<div id="bgToast" class="bg-toast"></div>

<script>
  // ----------------------------------------------
  //  ROTATING BACKGROUND FROM /images/ folder
  //  images named: image1.jpeg, image2.jpeg, image3.jpeg ... up to 20
  //  smart fallback + error resilience
  //  Also full NOTEPAD features: create, edit, delete, export/import, word counter
  // ----------------------------------------------

  // ---------- BACKGROUND IMAGE MANAGEMENT ----------
  let availableImages = [];
  let currentBgIndex = 0;
  let bgRotationInterval = null;
  const imageBasePath = "/images/";
  // we will discover images from image1.jpeg to image20.jpeg (flexible)
  const MAX_IMAGES = 25;
  
  // generate possible image names
  function generateImageNames() {
    let names = [];
    // support .jpeg and .jpg
    for (let i = 1; i <= MAX_IMAGES; i++) {
      names.push(`image${i}.jpeg`);
      names.push(`image${i}.jpg`);
    }
    return names;
  }
  
  // test if image loads, then add to available list
  function preloadImage(url, callback) {
    const img = new Image();
    img.onload = () => callback(true);
    img.onerror = () => callback(false);
    img.src = url;
  }
  
  function discoverAndSetImages() {
    const candidates = generateImageNames();
    let pending = candidates.length;
    let loadedAny = false;
    candidates.forEach(name => {
      const fullUrl = imageBasePath + name;
      preloadImage(fullUrl, (success) => {
        if (success) {
          if (!availableImages.includes(fullUrl)) {
            availableImages.push(fullUrl);
            loadedAny = true;
          }
        }
        pending--;
        if (pending === 0) {
          if (availableImages.length === 0) {
            // fallback: solid gradient but still show message
            document.body.style.backgroundImage = "radial-gradient(circle at 30% 40%, #1a2635, #0b0f1a)";
            document.getElementById("activeBgName").innerText = "fallback gradient";
            showBgToast("⚠️ No images found in /images/ (image1.jpeg...) using gradient");
          } else {
            // start rotation with first random image
            startBackgroundRotation();
            showBgToast(`✅ Found ${availableImages.length} background images from /images/`);
          }
        }
      });
    });
    // safety timeout
    setTimeout(() => {
      if (availableImages.length === 0 && pending > 0) {
        document.body.style.backgroundImage = "radial-gradient(circle at 30% 40%, #1a2635, #0b0f1a)";
        document.getElementById("activeBgName").innerText = "fallback gradient";
        showBgToast("⚠️ Could not load /images/image*.jpeg — check folder");
      }
    }, 2000);
  }
  
  function setRandomBackground() {
    if (availableImages.length === 0) return false;
    let newIndex = Math.floor(Math.random() * availableImages.length);
    currentBgIndex = newIndex;
    const bgUrl = availableImages[currentBgIndex];
    document.body.style.backgroundImage = `url(${bgUrl})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    let shortName = bgUrl.split('/').pop();
    document.getElementById("activeBgName").innerHTML = `<i class="fas fa-image"></i> ${shortName}`;
    showBgToast(`🎨 background: ${shortName}`);
    return true;
  }
  
  function nextBackgroundManually() {
    if (availableImages.length === 0) {
      showBgToast("No images loaded yet, check /images/ folder");
      return;
    }
    setRandomBackground();
  }
  
  function startBackgroundRotation() {
    if (bgRotationInterval) clearInterval(bgRotationInterval);
    setRandomBackground(); // immediate
    bgRotationInterval = setInterval(() => {
      setRandomBackground();
    }, 30000); // rotate every 30 seconds
  }
  
  function showBgToast(msg) {
    const toast = document.getElementById("bgToast");
    toast.textContent = msg;
    toast.style.opacity = "1";
    setTimeout(() => { toast.style.opacity = "0"; }, 2500);
  }
  
  // ---------- FULL NOTEPAD FEATURES (notes) ----------
  let notesArray = [];     // each: { id, title, content, createdAt, updatedAt }
  let editModeId = null;
  
  // DOM elements
  const notesContainer = document.getElementById('notesContainer');
  const editorPanel = document.getElementById('editorPanel');
  const noteTitleInput = document.getElementById('noteTitleInput');
  const noteBodyInput = document.getElementById('noteBodyInput');
  const saveBtn = document.getElementById('saveNoteBtn');
  const cancelBtn = document.getElementById('cancelEditBtn');
  const newNoteBtn = document.getElementById('newNoteBtn');
  const deleteAllBtn = document.getElementById('deleteAllNotesBtn');
  const totalNotesSpan = document.getElementById('totalNotesCount');
  const rotateBgBtn = document.getElementById('rotateBgNowBtn');
  
  function updateStats() {
    totalNotesSpan.innerText = notesArray.length;
    localStorage.setItem('crystalnote_data', JSON.stringify(notesArray));
  }
  
  function persistNotes() {
    localStorage.setItem('crystalnote_data', JSON.stringify(notesArray));
    updateStats();
    renderAllNotes();
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function renderAllNotes() {
    if (!notesContainer) return;
    if (notesArray.length === 0) {
      notesContainer.innerHTML = `<div class="empty-notes"><i class="fas fa-journal-whills"></i> ✨ No notes yet. Click "New Note" to start writing.<br>📝 Your crystal clear notepad with dynamic backgrounds.</div>`;
      return;
    }
    let html = '';
    notesArray.forEach(note => {
      let preview = note.content.length > 120 ? note.content.substring(0, 120) + '...' : note.content;
      let displayDate = note.updatedAt ? new Date(note.updatedAt).toLocaleString() : (note.createdAt ? new Date(note.createdAt).toLocaleString() : 'recent');
      html += `
        <div class="note-card" data-id="${note.id}">
          <div class="note-header">
            <span class="note-title"><i class="fas fa-bookmark"></i> ${escapeHtml(note.title) || 'Untitled'}</span>
            <span class="note-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(displayDate)}</span>
          </div>
          <div class="note-body">${escapeHtml(preview)}</div>
          <div class="card-footer">
            <button class="icon-btn edit-note-btn" data-id="${note.id}"><i class="fas fa-edit"></i> Edit</button>
            <button class="icon-btn delete-note-btn" data-id="${note.id}"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        </div>
      `;
    });
    notesContainer.innerHTML = html;
    
    document.querySelectorAll('.edit-note-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        openEditorForEdit(id);
      });
    });
    document.querySelectorAll('.delete-note-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        if (confirm('Delete this note permanently?')) deleteNoteById(id);
      });
    });
  }
  
  function deleteNoteById(id) {
    notesArray = notesArray.filter(n => n.id !== id);
    persistNotes();
    renderAllNotes();
    if (editModeId === id) closeEditor();
  }
  
  function openNewNoteEditor() {
    editModeId = null;
    noteTitleInput.value = '';
    noteBodyInput.value = '';
    document.getElementById('editorModeText').innerHTML = '✨ Create new note · full notepad';
    editorPanel.style.display = 'block';
    noteTitleInput.focus();
    editorPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  function openEditorForEdit(id) {
    const note = notesArray.find(n => n.id === id);
    if (!note) return;
    editModeId = id;
    noteTitleInput.value = note.title || '';
    noteBodyInput.value = note.content || '';
    document.getElementById('editorModeText').innerHTML = `✏️ Editing: "${(note.title || 'Untitled').substring(0, 40)}"`;
    editorPanel.style.display = 'block';
    noteTitleInput.focus();
    editorPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  function saveCurrentNote() {
    let title = noteTitleInput.value.trim();
    let content = noteBodyInput.value;
    if (title === '') title = 'Untitled Note';
    if (content === '') content = ' ';
    const now = new Date().toISOString();
    if (editModeId !== null) {
      const index = notesArray.findIndex(n => n.id === editModeId);
      if (index !== -1) {
        notesArray[index].title = title;
        notesArray[index].content = content;
        notesArray[index].updatedAt = now;
      }
    } else {
      const newNote = {
        id: Date.now(),
        title: title,
        content: content,
        createdAt: now,
        updatedAt: now,
      };
      notesArray.unshift(newNote);
    }
    persistNotes();
    renderAllNotes();
    closeEditor();
  }
  
  function closeEditor() {
    editorPanel.style.display = 'none';
    editModeId = null;
    noteTitleInput.value = '';
    noteBodyInput.value = '';
  }
  
  function deleteAllNotes() {
    if (notesArray.length === 0) return;
    if (confirm('⚠️ Delete ALL notes? This action is permanent.')) {
      notesArray = [];
      persistNotes();
      renderAllNotes();
      closeEditor();
    }
  }
  
  // export / import (additional notepad pro feature)
  function exportNotes() {
    const dataStr = JSON.stringify(notesArray, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `crystalnote_backup_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  
  function importNotesFromFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported)) {
          notesArray = imported.map(n => ({
            ...n,
            id: n.id || Date.now() + Math.random(),
            updatedAt: n.updatedAt || new Date().toISOString()
          }));
          persistNotes();
          renderAllNotes();
          closeEditor();
          alert(`Imported ${notesArray.length} notes successfully.`);
        } else alert('Invalid note file.');
      } catch (err) { alert('Error parsing file.'); }
    };
    reader.readAsText(file);
  }
  
  // word & character counter inside editor (extra notepad elegance)
  function addWordCounter() {
    const counterDiv = document.createElement('div');
    counterDiv.style.cssText = 'text-align: right; font-size: 12px; margin-top: 8px; color: #c4dbff; display: flex; justify-content: space-between;';
    counterDiv.id = 'noteWordCounter';
    const parent = document.querySelector('.input-row:last-of-type');
    if (parent && !document.getElementById('noteWordCounter')) {
      parent.insertAdjacentElement('afterend', counterDiv);
    }
    function update() {
      const text = noteBodyInput.value;
      const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
      const chars = text.length;
      const counterSpan = document.getElementById('noteWordCounter');
      if (counterSpan) counterSpan.innerHTML = `<span><i class="fas fa-paragraph"></i> ${words} words</span> <span><i class="fas fa-i-cursor"></i> ${chars} characters</span>`;
    }
    noteBodyInput.addEventListener('input', update);
    update();
  }
  
  function loadInitialNotes() {
    const stored = localStorage.getItem('crystalnote_data');
    if (stored) {
      try {
        notesArray = JSON.parse(stored);
        if (!Array.isArray(notesArray)) notesArray = [];
      } catch(e) { notesArray = []; }
    }
    if (notesArray.length === 0) {
      const now = new Date().toISOString();
      notesArray = [
        { id: Date.now()+1, title: '🌄 Welcome to CrystalNote', content: 'This notepad automatically rotates backgrounds from /images/image1.jpeg, image2.jpeg ...\n\n✅ Create / edit / delete notes\n✅ Word & character counter\n✅ Export / import backup\n✅ Transparent glass UI + dynamic images', createdAt: now, updatedAt: now },
        { id: Date.now()+2, title: '📌 Try background rotation', content: 'Press "Next Background" button or wait 30s — images will cycle from your /images/ folder.\n\nIf no images detected, it falls back to a smooth gradient.\n\nEnjoy pure notepad experience!', createdAt: now, updatedAt: now }
      ];
      persistNotes();
    }
    renderAllNotes();
    updateStats();
  }
  
  // setup UI additional buttons
  function setupExtraButtons() {
    const actionDiv = document.querySelector('.action-buttons');
    const exportBtn = document.createElement('button');
    exportBtn.className = 'glass-btn';
    exportBtn.innerHTML = '<i class="fas fa-download"></i> Export';
    exportBtn.addEventListener('click', exportNotes);
    const importBtn = document.createElement('button');
    importBtn.className = 'glass-btn';
    importBtn.innerHTML = '<i class="fas fa-upload"></i> Import';
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'application/json';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) importNotesFromFile(e.target.files[0]);
      fileInput.value = '';
    });
    importBtn.addEventListener('click', () => fileInput.click());
    actionDiv.appendChild(exportBtn);
    actionDiv.appendChild(importBtn);
    document.body.appendChild(fileInput);
  }
  
  // initializer
  function init() {
    loadInitialNotes();
    discoverAndSetImages();   // async detection of /images/image*.jpeg
    addWordCounter();
    setupExtraButtons();
    
    newNoteBtn.addEventListener('click', openNewNoteEditor);
    deleteAllBtn.addEventListener('click', deleteAllNotes);
    saveBtn.addEventListener('click', saveCurrentNote);
    cancelBtn.addEventListener('click', closeEditor);
    rotateBgBtn.addEventListener('click', nextBackgroundManually);
  }
  
  init();
</script>
</body>
