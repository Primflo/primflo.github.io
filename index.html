<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NovaNote | Transparent Notepad</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'SF Pro Text', -apple-system, 'Inter', system-ui, sans-serif;
    }

    /* TRANSPARENT BACKGROUND with subtle dynamic grain */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, rgba(20, 30, 45, 0.65), rgba(8, 12, 20, 0.8));
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    /* extra glass texture */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path fill="none" d="M20 20 L180 20 M20 40 L180 40 M20 60 L180 60 M20 80 L180 80 M20 100 L180 100 M20 120 L180 120 M20 140 L180 140 M20 160 L180 160 M20 180 L180 180" stroke="white" stroke-width="1"/><circle cx="50" cy="50" r="3" fill="white"/><circle cx="150" cy="120" r="2" fill="white"/></svg>');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 0;
    }

    /* main app container — completely transparent glass */
    .app-container {
      width: 1400px;
      max-width: 98vw;
      background: rgba(18, 22, 32, 0.45);
      backdrop-filter: blur(18px) saturate(160%);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
      padding: 28px 30px;
      transition: all 0.2s;
      position: relative;
      z-index: 2;
    }

    /* header – minimalist */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 20px;
      margin-bottom: 28px;
    }
    .title-area h1 {
      font-weight: 600;
      font-size: 1.9rem;
      background: linear-gradient(135deg, #FFFFFF, #B0D4FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .title-area p {
      color: rgba(255,255,240,0.7);
      font-size: 0.85rem;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
    }
    .glass-btn {
      background: rgba(255,255,255,0.12);
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .glass-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .danger-glass {
      background: rgba(180, 50, 50, 0.35);
      border-color: rgba(255,100,100,0.4);
    }
    .danger-glass:hover {
      background: rgba(200, 60, 60, 0.6);
    }

    /* stats bar (transparent) */
    .stats-bar {
      display: flex;
      gap: 26px;
      background: rgba(0,0,0,0.25);
      border-radius: 60px;
      padding: 10px 22px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
    }
    .stat-item {
      color: #f0f0f0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-item i {
      color: #6bc5ff;
    }

    /* NOTE EDITOR PANEL (floating style inside) */
    .editor-panel {
      background: rgba(10, 14, 23, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 36px;
      padding: 20px 24px;
      margin-bottom: 32px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .editor-title {
      font-size: 1.3rem;
      font-weight: 500;
      color: white;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 18px;
    }
    .input-row input, .input-row textarea {
      flex: 1;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 28px;
      padding: 12px 18px;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .input-row input:focus, .input-row textarea:focus {
      border-color: #5f9eff;
      box-shadow: 0 0 10px rgba(95,158,255,0.3);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    .editor-actions {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
    }
    .primary-btn {
      background: #2c6e9e;
      border: none;
      border-radius: 40px;
      padding: 10px 24px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .secondary-btn {
      background: rgba(100,100,120,0.5);
      border: none;
      border-radius: 40px;
      padding: 10px 24px;
      color: #eee;
    }

    /* NOTES GRID / cards – all note pad features */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 22px;
      margin-top: 12px;
    }
    .note-card {
      background: rgba(25, 30, 42, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .note-card:hover {
      transform: translateY(-4px);
      background: rgba(35, 40, 55, 0.75);
      border-color: rgba(255,255,255,0.35);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px dashed rgba(255,255,255,0.2);
      padding-bottom: 8px;
    }
    .note-title {
      font-weight: 700;
      font-size: 1.2rem;
      color: #f2f2ff;
      word-break: break-word;
    }
    .note-date {
      font-size: 0.7rem;
      color: #bfd9ff;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 40px;
    }
    .note-body {
      color: #e0e5f0;
      line-height: 1.45;
      margin: 14px 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .card-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 14px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: #bbd4ff;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .delete-note {
      color: #ff9e8f;
    }
    .empty-notes {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,240,0.6);
      font-style: italic;
      background: rgba(0,0,0,0.2);
      border-radius: 48px;
      backdrop-filter: blur(8px);
    }
    footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }
    @media (max-width: 700px) {
      .app-container { padding: 18px; }
      .notes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- header area -->
  <div class="top-header">
    <div class="title-area">
      <h1><i class="fas fa-feather-alt"></i> NovaNote · Pure Notepad</h1>
      <p>transparent • full feature notepad • your ideas, elegantly</p>
    </div>
    <div class="action-buttons">
      <button class="glass-btn" id="newNoteFloatyBtn"><i class="fas fa-plus-circle"></i> New Note</button>
      <button class="glass-btn danger-glass" id="deleteAllNotesBtn"><i class="fas fa-trash-alt"></i> Clear All</button>
    </div>
  </div>

  <!-- live stats (shows all pad metrics) -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><i class="fas fa-sticky-note"></i> <span id="totalNotesCount">0</span> notes</div>
    <div class="stat-item"><i class="fas fa-clock"></i> Last updated: <span id="lastUpdate">—</span></div>
    <div class="stat-item"><i class="fas fa-database"></i> <span id="storageStatus">local</span> vault</div>
  </div>

  <!-- EDITOR PANEL (all notepad features: title, body, edit mode) -->
  <div class="editor-panel" id="editorPanel" style="display: none;">
    <div class="editor-title">
      <i class="fas fa-pen-fancy" style="color:#80c0ff"></i> 
      <span id="editorModeText">✍️ Create new note</span>
    </div>
    <div class="input-row">
      <input type="text" id="noteTitleInput" placeholder="Note title ..." autocomplete="off">
    </div>
    <div class="input-row">
      <textarea id="noteBodyInput" placeholder="Write your thoughts, tasks, ideas, or any content here ... (supports rich plain text, markdown ready)"></textarea>
    </div>
    <div class="editor-actions">
      <button class="primary-btn" id="saveNoteBtn"><i class="fas fa-save"></i> Save Note</button>
      <button class="secondary-btn" id="cancelEditBtn"><i class="fas fa-times"></i> Cancel</button>
    </div>
  </div>

  <!-- NOTES DISPLAY (all notes, notepad cards) -->
  <div id="notesContainer" class="notes-grid">
    <!-- dynamic notes injected -->
  </div>
  <footer>
    <i class="fas fa-moon"></i> transparent interface • all notes saved in browser • full notepad features: create, edit, delete, search? use browser find or type filter ✨
  </footer>
</div>

<script>
  // --------------------------------------------------------------
  // PURE NOTEPAD APPLICATION: ALL NOTEPAD FEATURES INCLUDED
  // - Create, Edit, Delete, Persistent Storage, Auto-save indicator,
  //   Character counter for body, word count (extra), timestamps,
  //   confirm delete, import/export optional but included as bonus
  // - Complete transparent background, no images, no broken links.
  // --------------------------------------------------------------
  
  // Data model
  let notesArray = [];      // each: { id, title, content, createdAt, updatedAt }
  let editModeId = null;    // if editing, store note id

  // DOM elements
  const notesContainer = document.getElementById('notesContainer');
  const editorPanel = document.getElementById('editorPanel');
  const noteTitleInput = document.getElementById('noteTitleInput');
  const noteBodyInput = document.getElementById('noteBodyInput');
  const saveBtn = document.getElementById('saveNoteBtn');
  const cancelBtn = document.getElementById('cancelEditBtn');
  const newNoteBtn = document.getElementById('newNoteFloatyBtn');
  const deleteAllBtn = document.getElementById('deleteAllNotesBtn');
  const totalNotesSpan = document.getElementById('totalNotesCount');
  const lastUpdateSpan = document.getElementById('lastUpdate');

  // Helper: update stats & last update display
  function updateStats() {
    totalNotesSpan.innerText = notesArray.length;
    if (notesArray.length > 0) {
      const mostRecent = [...notesArray].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];
      if (mostRecent && mostRecent.updatedAt) {
        let date = new Date(mostRecent.updatedAt);
        lastUpdateSpan.innerText = date.toLocaleTimeString() + ' ' + date.toLocaleDateString();
      } else {
        lastUpdateSpan.innerText = 'just now';
      }
    } else {
      lastUpdateSpan.innerText = '—';
    }
    // store updated timestamp locally
    localStorage.setItem('novanote_notes', JSON.stringify(notesArray));
  }

  // Save notes to localStorage
  function persistNotes() {
    localStorage.setItem('novanote_notes', JSON.stringify(notesArray));
    updateStats();
    renderAllNotes();
  }

  // render all note cards (full notepad view)
  function renderAllNotes() {
    if (!notesContainer) return;
    if (notesArray.length === 0) {
      notesContainer.innerHTML = `<div class="empty-notes"><i class="fas fa-journal-whills"></i> ✨ No notes yet. Click "New Note" to capture ideas.<br>📝 Your personal transparent notepad is ready.</div>`;
      return;
    }
    let html = '';
    notesArray.forEach(note => {
      // truncate content preview
      let preview = note.content.length > 110 ? note.content.substring(0, 110) + '...' : note.content;
      let displayDate = note.updatedAt ? new Date(note.updatedAt).toLocaleString() : (note.createdAt ? new Date(note.createdAt).toLocaleString() : 'recent');
      html += `
        <div class="note-card" data-id="${note.id}">
          <div class="note-header">
            <span class="note-title"><i class="fas fa-bookmark"></i> ${escapeHtml(note.title) || 'Untitled'}</span>
            <span class="note-date"><i class="far fa-calendar-alt"></i> ${escapeHtml(displayDate)}</span>
          </div>
          <div class="note-body">${escapeHtml(preview)}</div>
          <div class="card-footer">
            <button class="icon-btn edit-note-btn" data-id="${note.id}" title="Edit note"><i class="fas fa-edit"></i> Edit</button>
            <button class="icon-btn delete-note" data-id="${note.id}" title="Delete note"><i class="fas fa-trash-alt"></i> Delete</button>
          </div>
        </div>
      `;
    });
    notesContainer.innerHTML = html;

    // attach event listeners to edit / delete buttons
    document.querySelectorAll('.edit-note-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.getAttribute('data-id'));
        openEditorForEdit(id);
      });
    });
    document.querySelectorAll('.delete-note').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.getAttribute('data-id'));
        if (confirm('Delete this note permanently?')) {
          deleteNoteById(id);
        }
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // delete note
  function deleteNoteById(id) {
    notesArray = notesArray.filter(n => n.id !== id);
    persistNotes();
    renderAllNotes();
    // if editor was open for deleted note, close it
    if (editModeId === id) {
      closeEditor();
    }
    updateStats();
  }

  // open editor for new note
  function openNewNoteEditor() {
    editModeId = null;
    noteTitleInput.value = '';
    noteBodyInput.value = '';
    document.getElementById('editorModeText').innerHTML = '✨ Create fresh note · full control';
    editorPanel.style.display = 'block';
    noteTitleInput.focus();
    // scroll to editor
    editorPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // open editor to edit existing note (full notepad feature)
  function openEditorForEdit(id) {
    const note = notesArray.find(n => n.id === id);
    if (!note) return;
    editModeId = id;
    noteTitleInput.value = note.title || '';
    noteBodyInput.value = note.content || '';
    document.getElementById('editorModeText').innerHTML = `✏️ Editing: "${(note.title || 'Untitled').substring(0, 40)}"`;
    editorPanel.style.display = 'block';
    noteTitleInput.focus();
    editorPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // save note logic (create or update)
  function saveCurrentNote() {
    let title = noteTitleInput.value.trim();
    let content = noteBodyInput.value;
    if (title === '') title = 'Untitled Note';
    if (content === '') content = ' ';
    const now = new Date().toISOString();
    if (editModeId !== null) {
      // update existing
      const index = notesArray.findIndex(n => n.id === editModeId);
      if (index !== -1) {
        notesArray[index].title = title;
        notesArray[index].content = content;
        notesArray[index].updatedAt = now;
      }
    } else {
      // create new note
      const newNote = {
        id: Date.now(),
        title: title,
        content: content,
        createdAt: now,
        updatedAt: now,
      };
      notesArray.unshift(newNote); // newest on top
    }
    persistNotes();
    renderAllNotes();
    closeEditor();
    updateStats();
  }

  function closeEditor() {
    editorPanel.style.display = 'none';
    editModeId = null;
    noteTitleInput.value = '';
    noteBodyInput.value = '';
  }

  // delete all notes (with confirmation)
  function deleteAllNotes() {
    if (notesArray.length === 0) return;
    if (confirm('⚠️ DELETE ALL NOTES? This action is permanent.')) {
      notesArray = [];
      persistNotes();
      renderAllNotes();
      closeEditor();
      updateStats();
    }
  }

  // bonus: export/import (notepad extra feature)
  function exportNotesAsJSON() {
    const dataStr = JSON.stringify(notesArray, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `novanote_backup_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importNotesFromJSON(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (Array.isArray(imported)) {
          notesArray = imported.map(n => ({
            ...n,
            id: n.id || Date.now() + Math.random(),
            updatedAt: n.updatedAt || new Date().toISOString()
          }));
          persistNotes();
          renderAllNotes();
          closeEditor();
          alert(`Imported ${notesArray.length} notes successfully.`);
        } else {
          alert('Invalid note file.');
        }
      } catch (err) {
        alert('Error parsing file.');
      }
    };
    reader.readAsText(file);
  }

  // Additional notepad features: word count display (dynamic added near editor but optional)
  // We add a subtle word/char counter in the editor panel as bonus notepad feature
  function addWordCounterToEditor() {
    const counterDiv = document.createElement('div');
    counterDiv.style.cssText = 'text-align: right; font-size: 12px; margin-top: 8px; color: #bfd9ff; display: flex; justify-content: space-between;';
    counterDiv.id = 'wordCharCounter';
    const parent = document.querySelector('.input-row:last-of-type');
    if (parent && !document.getElementById('wordCharCounter')) {
      parent.insertAdjacentElement('afterend', counterDiv);
    }
    function updateCounter() {
      const text = noteBodyInput.value;
      const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
      const chars = text.length;
      const counterSpan = document.getElementById('wordCharCounter');
      if (counterSpan) counterSpan.innerHTML = `<span><i class="fas fa-paragraph"></i> ${words} words</span> <span><i class="fas fa-i-cursor"></i> ${chars} characters</span>`;
    }
    noteBodyInput.addEventListener('input', updateCounter);
    updateCounter();
  }

  // load initial data & seed some example notes if empty (to show notepad capabilities)
  function loadInitialData() {
    const stored = localStorage.getItem('novanote_notes');
    if (stored) {
      try {
        notesArray = JSON.parse(stored);
        if (!Array.isArray(notesArray)) notesArray = [];
      } catch(e) { notesArray = []; }
    }
    // if empty, seed a couple of example notes to showcase notepad features
    if (notesArray.length === 0) {
      const now = new Date().toISOString();
      notesArray = [
        {
          id: Date.now() + 1,
          title: '✨ Welcome to NovaNote',
          content: 'This is a full-featured notepad with transparent background.\n\n✅ Create, edit, delete notes.\n✅ Auto-save locally.\n✅ Word & character counter.\n✅ Export/Import backup.\n✅ Clean frosted glass UI.',
          createdAt: now,
          updatedAt: now,
        },
        {
          id: Date.now() + 2,
          title: '📝 Meeting notes example',
          content: 'Brainstorm session:\n- Improve UX\n- Add daily journal\n- Review project timeline\n\nAll data stays in your browser.',
          createdAt: now,
          updatedAt: now,
        }
      ];
      persistNotes();
    }
    renderAllNotes();
    updateStats();
  }

  // attach global listeners & extra notepad features (export/import hidden but accessible)
  function init() {
    loadInitialData();
    // add export / import buttons to UI elegantly (optional but displays all notepad features)
    const actionDiv = document.querySelector('.action-buttons');
    const exportBtn = document.createElement('button');
    exportBtn.className = 'glass-btn';
    exportBtn.innerHTML = '<i class="fas fa-download"></i> Export';
    exportBtn.addEventListener('click', exportNotesAsJSON);
    const importBtn = document.createElement('button');
    importBtn.className = 'glass-btn';
    importBtn.innerHTML = '<i class="fas fa-upload"></i> Import';
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'application/json';
    fileInput.style.display = 'none';
    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) importNotesFromJSON(e.target.files[0]);
      fileInput.value = '';
    });
    importBtn.addEventListener('click', () => fileInput.click());
    actionDiv.appendChild(exportBtn);
    actionDiv.appendChild(importBtn);
    document.body.appendChild(fileInput);
    
    newNoteBtn.addEventListener('click', openNewNoteEditor);
    deleteAllBtn.addEventListener('click', deleteAllNotes);
    saveBtn.addEventListener('click', saveCurrentNote);
    cancelBtn.addEventListener('click', closeEditor);
    addWordCounterToEditor();
    // set background completely transparent – absolutely no image dependency
    document.body.style.background = "radial-gradient(circle at 30% 40%, rgba(25,35,55,0.85), rgba(10,14,22,0.92))";
    document.body.style.backdropFilter = "blur(2px)";
  }

  init();
</script>
</body>
</html>
