<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Prim - List of Death</title>
    <style>
        /* Wishlist specific styles - maintains your color scheme */
        .wishlist-container {
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .wishlist-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .wishlist-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .wishlist-container::-webkit-scrollbar-thumb {
            background: #b74b4b;
            border-radius: 10px;
        }
        
        .wish-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: 0.3s ease;
            border-left: 3px solid #b74b4b;
        }
        
        .wish-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        
        .wish-item.completed {
            opacity: 0.6;
            border-left-color: #00ff00;
        }
        
        .wish-item.completed .wish-text {
            text-decoration: line-through;
        }
        
        .wish-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .wish-check {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #b74b4b;
        }
        
        .wish-text {
            font-size: 1.6rem;
            color: white;
            flex: 1;
            word-break: break-word;
        }
        
        .wish-edit-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #b74b4b;
            color: white;
            padding: 0.5rem;
            font-size: 1.6rem;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        
        .wish-actions {
            display: flex;
            gap: 1rem;
        }
        
        .wish-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            transition: 0.3s ease;
            padding: 0.5rem;
        }
        
        .edit-btn {
            color: #ffc107;
        }
        
        .edit-btn:hover {
            color: #ffca2c;
            transform: scale(1.1);
        }
        
        .delete-btn {
            color: #dc3545;
        }
        
        .delete-btn:hover {
            color: #ff4757;
            transform: scale(1.1);
        }
        
        .save-btn {
            color: #28a745;
        }
        
        .save-btn:hover {
            color: #34ce57;
            transform: scale(1.1);
        }
        
        .add-wish-form {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 10px;
        }
        
        .add-wish-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #b74b4b;
            color: white;
            padding: 1rem;
            font-size: 1.6rem;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
        }
        
        .add-wish-input:focus {
            outline: none;
            border-color: #b74b4b;
            box-shadow: 0 0 10px rgba(183, 75, 75, 0.3);
        }
        
        .add-btn {
            background: #b74b4b;
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.3s ease;
        }
        
        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #b74b4b;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            font-size: 1.4rem;
        }
        
        .stats span {
            color: #b74b4b;
            font-weight: bold;
        }
        
        .page-title {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .page-title span {
            color: #b74b4b;
        }
        
        .subtitle {
            font-size: 1.4rem;
            color: #ccc;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 995px) {
            .wish-item {
                flex-direction: column;
                align-items: stretch;
            }
            
            .wish-actions {
                justify-content: flex-end;
            }
            
            .add-wish-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Prim</a>
        <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="skills.html">Skills</a>
    <a href="education.html">Education</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
</nav>
        
    </header>
    
    <section class="home">
        <div class="home-img">
            <img src="main.jpg" alt="Prim">
        </div>
        <div class="home-content">
            <h1 class="page-title">List of <span>Death</span></h1>
            <p class="subtitle">Things I must do before I die ⚡</p>
            
            <div class="stats">
                <div>Total Wishes: <span id="totalCount">0</span></div>
                <div>Completed: <span id="completedCount">0</span></div>
                <div>Remaining: <span id="remainingCount">0</span></div>
            </div>
            
            <div class="wishlist-container" id="wishlistContainer">
                <!-- Wishes will appear here -->
            </div>
            
            <div class="add-wish-form">
                <input type="text" class="add-wish-input" id="newWishInput" placeholder="Add a new wish... (e.g., Skydive in Dubai)">
                <button class="btn add-btn" id="addWishBtn">➕ Add Wish</button>
            </div>
            
            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <script>
        // Load wishes from localStorage
        let wishes = JSON.parse(localStorage.getItem('deathListWishes')) || [
            { id: 1, text: "Skydive in New Zealand", completed: false },
            { id: 2, text: "Write a bestselling novel", completed: false },
            { id: 3, text: "Visit all 7 continents", completed: false },
            { id: 4, text: "Learn to play piano", completed: false },
            { id: 5, text: "Start a charity foundation", completed: false }
        ];
        
        let editingId = null;
        
        // Save to localStorage
        function saveWishes() {
            localStorage.setItem('deathListWishes', JSON.stringify(wishes));
            renderWishes();
            updateStats();
        }
        
        // Update statistics
        function updateStats() {
            const total = wishes.length;
            const completed = wishes.filter(w => w.completed).length;
            const remaining = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('remainingCount').textContent = remaining;
        }
        
        // Render all wishes
        function renderWishes() {
            const container = document.getElementById('wishlistContainer');
            
            if (wishes.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: #ccc;">
                        <i class="fas fa-skull" style="font-size: 4rem; margin-bottom: 1rem; color: #b74b4b;"></i>
                        <p>No wishes yet. Add your first wish above!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = wishes.map(wish => `
                <div class="wish-item ${wish.completed ? 'completed' : ''}" data-id="${wish.id}">
                    <div class="wish-content">
                        <input type="checkbox" class="wish-check" ${wish.completed ? 'checked' : ''} onchange="toggleComplete(${wish.id})">
                        ${editingId === wish.id ? 
                            `<input type="text" class="wish-edit-input" id="editInput-${wish.id}" value="${escapeHtml(wish.text)}">` :
                            `<span class="wish-text">${escapeHtml(wish.text)}</span>`
                        }
                    </div>
                    <div class="wish-actions">
                        ${editingId === wish.id ? 
                            `<button class="save-btn" onclick="saveEdit(${wish.id})"><i class="fas fa-save"></i></button>
                             <button class="delete-btn" onclick="cancelEdit()"><i class="fas fa-times"></i></button>` :
                            `<button class="edit-btn" onclick="startEdit(${wish.id})"><i class="fas fa-edit"></i></button>
                             <button class="delete-btn" onclick="deleteWish(${wish.id})"><i class="fas fa-trash"></i></button>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Toggle complete status
        function toggleComplete(id) {
            const wish = wishes.find(w => w.id === id);
            if (wish) {
                wish.completed = !wish.completed;
                saveWishes();
            }
        }
        
        // Start editing
        function startEdit(id) {
            editingId = id;
            renderWishes();
            const editInput = document.getElementById(`editInput-${id}`);
            if (editInput) {
                editInput.focus();
                editInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') saveEdit(id);
                });
            }
        }
        
        // Save edited wish
        function saveEdit(id) {
            const editInput = document.getElementById(`editInput-${id}`);
            const newText = editInput.value.trim();
            if (newText) {
                const wish = wishes.find(w => w.id === id);
                if (wish) {
                    wish.text = newText;
                }
            }
            editingId = null;
            saveWishes();
        }
        
        // Cancel editing
        function cancelEdit() {
            editingId = null;
            renderWishes();
        }
        
        // Delete wish
        function deleteWish(id) {
            if (confirm('Are you sure you want to delete this wish?')) {
                wishes = wishes.filter(w => w.id !== id);
                if (editingId === id) editingId = null;
                saveWishes();
            }
        }
        
        // Add new wish
        function addWish() {
            const input = document.getElementById('newWishInput');
            const text = input.value.trim();
            
            if (text === '') {
                alert('Please enter a wish!');
                return;
            }
            
            const newId = wishes.length > 0 ? Math.max(...wishes.map(w => w.id)) + 1 : 1;
            wishes.push({
                id: newId,
                text: text,
                completed: false
            });
            
            input.value = '';
            saveWishes();
        }
        
        // Event listeners
        document.getElementById('addWishBtn').addEventListener('click', addWish);
        document.getElementById('newWishInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addWish();
        });
        
        // Initial render
        renderWishes();
        updateStats();
    </script>
</body>
</html>
